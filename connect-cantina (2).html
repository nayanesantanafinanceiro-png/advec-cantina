<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Connect — ADVEC Maceió · Cantina</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Dancing+Script:wght@700&family=Poppins:wght@400;500;600;700;800&display=swap');

  :root{
    --rustDark:#4A190C;
    --rust:#8C2F14;
    --orange:#D65A1C;
    --orangeLight:#EE8B2E;
    --cream:#F1E1A6;
    --navy:#14141C;
    --navyLight:#1F2130;
    --paper:#FBF7EF;
  }

  html,body{ height:100%; }
  body{
    background: var(--paper);
    font-family: 'Poppins', sans-serif;
    margin:0;
  }
  .headline{ font-family:'Bebas Neue', sans-serif; letter-spacing:0.04em; }
  .flourish{ font-family:'Dancing Script', cursive; }

  .header-gradient{
    background: linear-gradient(160deg, var(--rustDark) 0%, var(--rust) 28%, var(--orange) 62%, var(--orangeLight) 100%);
  }

  .print-report{ display:none; }

  @media print {
    .app-shell{ display:none !important; }
    .print-report{ display:block !important; }
    @page{ margin:14mm; }
  }

  input:focus{ outline:none; border-color: var(--orange) !important; }

  .active\:scale-98:active{ transform:scale(0.98); }

  ::-webkit-scrollbar{ width:0; height:0; }
</style>
</head>
<body>

<div id="loading-screen" class="min-h-screen flex items-center justify-center" style="background:var(--paper)">
  <i data-lucide="loader-2" class="animate-spin" style="color:var(--orange)" width="28" height="28"></i>
</div>

<div id="root" class="hidden"></div>

<script>
/* =========================================================
   Connect Cantina — vanilla JS port of the original React app
   ========================================================= */

const C = {
  rustDark: '#4A190C',
  rust: '#8C2F14',
  orange: '#D65A1C',
  orangeLight: '#EE8B2E',
  cream: '#F1E1A6',
  navy: '#14141C',
  navyLight: '#1F2130',
  paper: '#FBF7EF',
};

const HEADER_GRADIENT = `linear-gradient(160deg, ${C.rustDark} 0%, ${C.rust} 28%, ${C.orange} 62%, ${C.orangeLight} 100%)`;

const PAYMENTS = [
  { id: 'dinheiro', label: 'Dinheiro', icon: 'banknote' },
  { id: 'pix', label: 'Pix', icon: 'qr-code' },
  { id: 'debito', label: 'Débito', icon: 'credit-card' },
  { id: 'credito', label: 'Crédito', icon: 'credit-card' },
];

function paymentLabel(id) {
  const p = PAYMENTS.find(p => p.id === id);
  return p ? p.label : id;
}

/* ---------- helpers ---------- */
function todayStr() {
  return new Date().toLocaleDateString('en-CA');
}
function formatBRL(v) {
  return (Number(v) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function formatDateDisplay(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}
function esc(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

/* =========================================================
   FIREBASE — configuração (Realtime Database)
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyDmjccfxhzoEIhpAdAE0lBvcjI51i-Bw3I",
  authDomain: "connect-cantina.firebaseapp.com",
  databaseURL: "https://connect-cantina-default-rtdb.firebaseio.com",
  projectId: "connect-cantina",
  storageBucket: "connect-cantina.firebasestorage.app",
  messagingSenderId: "960368102262",
  appId: "1:960368102262:web:1c174f2a6d2a4e490f4857",
  measurementId: "G-VKWF6WLRR4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const REF_PRODUCTS = db.ref('cantina/products');
const REF_SALES = db.ref('cantina/sales');

function dbRef(key) {
  return key === 'cantina_products' ? REF_PRODUCTS : REF_SALES;
}

/* ---------- persistence (Firebase Realtime Database, dados reais e online) ---------- */
const storage = {
  async get(key) {
    try {
      const snap = await dbRef(key).once('value');
      return snap.exists() ? (snap.val().items || []) : null;
    } catch (e) { return null; }
  },
  async set(key, value) {
    try {
      await dbRef(key).set({
        items: value,
        updatedAt: firebase.database.ServerValue.TIMESTAMP,
      });
      return true;
    } catch (e) { return false; }
  }
};

/* ---------- app state ---------- */
const state = {
  products: storage.get('cantina_products') || [],
  sales: storage.get('cantina_sales_all') || [],
  tab: 'vendas',
  selectedDate: todayStr(),
  saleTarget: null,
  productModal: null, // null | {} | product
  toast: '',
  loadError: false,
};
let toastTimer = null;

async function persistProducts(next) {
  state.products = next;
  render();
  const ok = await storage.set('cantina_products', next);
  if (!ok) showToast('Erro ao salvar produtos');
}
async function persistSales(next) {
  state.sales = next;
  render();
  const ok = await storage.set('cantina_sales_all', next);
  if (!ok) showToast('Erro ao salvar venda');
}
function showToast(msg) {
  state.toast = msg;
  clearTimeout(toastTimer);
  render();
  toastTimer = setTimeout(() => { state.toast = ''; render(); }, 1800);
}

/* ---------- products crud ---------- */
function saveProduct(data) {
  if (data.id) {
    persistProducts(state.products.map(p => p.id === data.id ? { ...p, ...data } : p));
    showToast('Produto atualizado');
  } else {
    persistProducts([...state.products, { ...data, id: uid(), active: true }]);
    showToast('Produto adicionado');
  }
  state.productModal = null;
  render();
}
function removeProduct(id) {
  persistProducts(state.products.filter(p => p.id !== id));
  showToast('Produto removido');
}

/* ---------- sales crud ---------- */
function addSale(product, qty, payment) {
  const entry = {
    id: uid(),
    date: todayStr(),
    time: new Date().toISOString(),
    productId: product.id,
    productName: product.name,
    qty,
    unitPrice: Number(product.salePrice) || 0,
    unitCost: Number(product.costPrice) || 0,
    payment,
  };
  persistSales([...state.sales, entry]);
  showToast('Venda registrada');
  state.saleTarget = null;
  render();
}
function removeSale(id) {
  persistSales(state.sales.filter(s => s.id !== id));
  showToast('Venda removida');
}

/* ---------- derived ---------- */
function salesForDate(date) {
  return state.sales.filter(s => s.date === date);
}
function totalsFor(list) {
  const revenue = list.reduce((a, s) => a + s.unitPrice * s.qty, 0);
  const cost = list.reduce((a, s) => a + s.unitCost * s.qty, 0);
  const byPayment = PAYMENTS.reduce((acc, p) => ({ ...acc, [p.id]: 0 }), {});
  list.forEach(s => { byPayment[s.payment] = (byPayment[s.payment] || 0) + s.unitPrice * s.qty; });
  return { revenue, cost, profit: revenue - cost, byPayment };
}
function datesWithSales() {
  return [...new Set(state.sales.map(s => s.date))].sort((a, b) => b.localeCompare(a));
}
function shiftDate(delta) {
  const d = new Date(state.selectedDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  state.selectedDate = d.toLocaleDateString('en-CA');
  render();
}

/* =========================================================
   RENDER FUNCTIONS
   ========================================================= */

function renderIcons() {
  if (window.lucide) window.lucide.createIcons();
}

function Header() {
  return `
    <header class="relative overflow-hidden px-5 pt-6 pb-5 header-gradient">
      <div class="absolute -right-6 -top-8 w-40 h-40 rounded-full opacity-20" style="background:${C.navy}; filter:blur(30px)"></div>
      <div class="absolute right-2 bottom-0 opacity-15 select-none pointer-events-none flourish text-5xl" style="color:${C.cream}">Até sermos Um</div>
      <p class="text-xs tracking-[0.3em] uppercase relative" style="color:${C.cream}">Departamento de Jovens · ADVEC</p>
      <h1 class="headline text-4xl leading-none mt-1 relative" style="color:#fff">
        CONNECT <span style="color:${C.cream}">— ADVEC MACEIÓ</span>
      </h1>
      <p class="text-sm mt-1 relative" style="color:rgba(255,255,255,0.85)">Cantina · Controle de Vendas</p>
    </header>
  `;
}

function BottomNav() {
  const items = [
    { id: 'vendas', label: 'Vendas', icon: 'shopping-cart' },
    { id: 'produtos', label: 'Produtos', icon: 'package' },
    { id: 'relatorio', label: 'Relatório', icon: 'file-text' },
    { id: 'historico', label: 'Histórico', icon: 'history' },
  ];
  return `
    <nav class="fixed bottom-0 left-0 right-0 z-40" style="background:${C.navy}">
      <div class="flex justify-around items-center py-2">
        ${items.map(({ id, label, icon }) => {
          const active = state.tab === id;
          const color = active ? C.orangeLight : '#8A8A99';
          return `
            <button data-tab="${id}" class="nav-btn flex flex-col items-center gap-0.5 px-2 py-1">
              <i data-lucide="${icon}" width="20" height="20" style="color:${color}"></i>
              <span class="text-[10px]" style="color:${color}">${label}</span>
            </button>
          `;
        }).join('')}
      </div>
      <div class="text-center pb-1.5">
        <span class="text-[9px]" style="color:#5B5B6B">Connect Cantina · desenvolvido por Nayane Santana</span>
      </div>
    </nav>
  `;
}

function StatCard({ label, value, icon, accent }) {
  return `
    <div class="rounded-2xl p-3 flex-1" style="background:#fff; border:1px solid #EEE3CE">
      <div class="flex items-center gap-1.5 mb-1">
        <i data-lucide="${icon}" width="14" height="14" style="color:${accent}"></i>
        <span class="text-[11px] font-medium text-stone-500">${label}</span>
      </div>
      <p class="text-lg font-bold" style="color:${C.navy}">${formatBRL(value)}</p>
    </div>
  `;
}

function VendasTab() {
  const todaySales = salesForDate(todayStr());
  const todayTotals = totalsFor(todaySales);
  const activeProducts = state.products.filter(p => p.active !== false);

  return `
    <div>
      <div class="flex gap-2 mb-4">
        ${StatCard({ label: 'Vendas hoje', value: todayTotals.revenue, icon: 'coins', accent: C.orange })}
        ${StatCard({ label: 'Lucro hoje', value: todayTotals.profit, icon: 'trending-up', accent: '#2F8F5B' })}
      </div>

      <div class="flex justify-between items-center mb-2">
        <h2 class="font-semibold text-sm" style="color:${C.navy}">Registrar venda</h2>
      </div>

      ${activeProducts.length === 0 ? `
        <div class="rounded-2xl p-5 text-center text-sm text-stone-500 bg-white border border-stone-200">
          Nenhum produto cadastrado ainda.
          <button id="go-products-btn" class="block mx-auto mt-2 text-sm font-semibold" style="color:${C.orange}">
            + Cadastrar produtos
          </button>
        </div>
      ` : `
        <div class="grid grid-cols-2 gap-2 mb-5">
          ${activeProducts.map(p => `
            <button data-pick-product="${p.id}" class="rounded-2xl p-3 text-left active:scale-98 transition" style="background:#fff; border:1px solid #EEE3CE">
              <p class="text-sm font-semibold" style="color:${C.navy}">${esc(p.name)}</p>
              <p class="text-xs font-bold mt-1" style="color:${C.orange}">${formatBRL(p.salePrice)}</p>
            </button>
          `).join('')}
        </div>
      `}

      <h2 class="font-semibold text-sm mb-2" style="color:${C.navy}">Vendas de hoje (${todaySales.length})</h2>
      ${todaySales.length === 0 ? `
        <p class="text-sm text-stone-400 text-center py-6">Nenhuma venda registrada ainda hoje.</p>
      ` : `
        <div class="space-y-2">
          ${[...todaySales].reverse().map(s => `
            <div class="flex items-center justify-between rounded-xl p-3 bg-white border border-stone-200">
              <div>
                <p class="text-sm font-medium" style="color:${C.navy}">${s.qty}x ${esc(s.productName)}</p>
                <p class="text-[11px] text-stone-500">${paymentLabel(s.payment)}</p>
              </div>
              <div class="flex items-center gap-3">
                <span class="text-sm font-semibold" style="color:${C.orange}">${formatBRL(s.unitPrice * s.qty)}</span>
                <button data-delete-sale="${s.id}"><i data-lucide="trash-2" width="16" height="16" style="color:#B0B0B0"></i></button>
              </div>
            </div>
          `).join('')}
        </div>
      `}
    </div>
  `;
}

function ProdutosTab() {
  return `
    <div>
      <div class="flex justify-between items-center mb-3">
        <h2 class="font-semibold text-sm" style="color:${C.navy}">Produtos do dia</h2>
        <button id="add-product-btn" class="flex items-center gap-1 text-sm font-semibold px-3 py-1.5 rounded-full text-white" style="background:${C.orange}">
          <i data-lucide="plus" width="14" height="14"></i> Novo
        </button>
      </div>
      ${state.products.length === 0 ? `
        <p class="text-sm text-stone-400 text-center py-8">Nenhum produto cadastrado. Toque em "Novo" para começar.</p>
      ` : ''}
      <div class="space-y-2">
        ${state.products.map(p => `
          <div class="rounded-xl p-3 bg-white border border-stone-200 flex items-center justify-between">
            <div>
              <p class="text-sm font-semibold" style="color:${C.navy}">${esc(p.name)}</p>
              <p class="text-[11px] text-stone-500">Custo ${formatBRL(p.costPrice)} · Venda <span class="font-semibold" style="color:${C.orange}">${formatBRL(p.salePrice)}</span></p>
            </div>
            <div class="flex items-center gap-3">
              <button data-edit-product="${p.id}"><i data-lucide="pencil" width="16" height="16" style="color:${C.navy}"></i></button>
              <button data-remove-product="${p.id}"><i data-lucide="trash-2" width="16" height="16" style="color:#B0B0B0"></i></button>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function PaymentChip(id, value) {
  const p = PAYMENTS.find(p => p.id === id);
  const icon = p ? p.icon : 'wallet';
  return `
    <div class="rounded-xl p-2 flex-1 text-center" style="background:#fff; border:1px solid #EEE3CE">
      <i data-lucide="${icon}" width="14" height="14" style="color:${C.orange}" class="mx-auto mb-1"></i>
      <p class="text-[10px] text-stone-500">${paymentLabel(id)}</p>
      <p class="text-xs font-bold" style="color:${C.navy}">${formatBRL(value)}</p>
    </div>
  `;
}

function RelatorioTab() {
  const date = state.selectedDate;
  const sales = salesForDate(date);
  const totals = totalsFor(sales);

  return `
    <div>
      <div class="flex items-center justify-between mb-4">
        <button id="shift-prev" class="p-2"><i data-lucide="chevron-left" width="18" height="18" style="color:${C.navy}"></i></button>
        <div class="text-center">
          <p class="text-base font-bold" style="color:${C.navy}">${formatDateDisplay(date)}</p>
          ${date !== todayStr() ? `<button id="go-today" class="text-[11px]" style="color:${C.orange}">voltar para hoje</button>` : ''}
        </div>
        <button id="shift-next" class="p-2"><i data-lucide="chevron-right" width="18" height="18" style="color:${C.navy}"></i></button>
      </div>

      <div class="rounded-2xl p-4 mb-4" style="background:${HEADER_GRADIENT}">
        <p class="text-xs uppercase tracking-wide" style="color:${C.cream}">Total de vendas</p>
        <p class="text-3xl font-bold text-white headline">${formatBRL(totals.revenue)}</p>
        <div class="flex gap-4 mt-2">
          <div><p class="text-[10px]" style="color:${C.cream}">Custo</p><p class="text-sm font-semibold text-white">${formatBRL(totals.cost)}</p></div>
          <div><p class="text-[10px]" style="color:${C.cream}">Lucro</p><p class="text-sm font-semibold text-white">${formatBRL(totals.profit)}</p></div>
          <div><p class="text-[10px]" style="color:${C.cream}">Itens</p><p class="text-sm font-semibold text-white">${sales.reduce((a, s) => a + s.qty, 0)}</p></div>
        </div>
      </div>

      <p class="text-sm font-semibold mb-2" style="color:${C.navy}">Formas de pagamento</p>
      <div class="flex gap-2 mb-5">
        ${PAYMENTS.map(p => PaymentChip(p.id, totals.byPayment[p.id])).join('')}
      </div>

      <button id="print-btn" ${sales.length === 0 ? 'disabled' : ''} class="w-full flex items-center justify-center gap-2 py-3 rounded-2xl text-white font-semibold mb-5 disabled:opacity-40" style="background:${C.navy}">
        <i data-lucide="printer" width="16" height="16"></i> Gerar / baixar PDF do dia
      </button>

      <p class="text-sm font-semibold mb-2" style="color:${C.navy}">Vendas do dia (${sales.length})</p>
      ${sales.length === 0 ? `
        <p class="text-sm text-stone-400 text-center py-6">Nenhuma venda registrada nesta data.</p>
      ` : `
        <div class="space-y-2">
          ${sales.map(s => `
            <div class="flex items-center justify-between rounded-xl p-3 bg-white border border-stone-200">
              <p class="text-sm" style="color:${C.navy}">${s.qty}x ${esc(s.productName)} <span class="text-[11px] text-stone-400">· ${paymentLabel(s.payment)}</span></p>
              <span class="text-sm font-semibold" style="color:${C.orange}">${formatBRL(s.unitPrice * s.qty)}</span>
            </div>
          `).join('')}
        </div>
      `}
    </div>
  `;
}

function HistoricoTab() {
  const dates = datesWithSales();
  return `
    <div>
      <h2 class="font-semibold text-sm mb-3" style="color:${C.navy}">Histórico de dias</h2>
      ${dates.length === 0 ? `
        <p class="text-sm text-stone-400 text-center py-8">Nenhuma venda registrada ainda.</p>
      ` : `
        <div class="space-y-2">
          ${dates.map(d => {
            const t = totalsFor(salesForDate(d));
            return `
              <button data-open-date="${d}" class="w-full text-left rounded-xl p-3 bg-white border border-stone-200 flex items-center justify-between">
                <div>
                  <p class="text-sm font-semibold" style="color:${C.navy}">${formatDateDisplay(d)}</p>
                  <p class="text-[11px] text-stone-500">Lucro ${formatBRL(t.profit)}</p>
                </div>
                <span class="text-sm font-bold" style="color:${C.orange}">${formatBRL(t.revenue)}</span>
              </button>
            `;
          }).join('')}
        </div>
      `}
    </div>
  `;
}

function PrintableReport() {
  const date = state.selectedDate;
  const sales = salesForDate(date);
  const totals = totalsFor(sales);

  return `
    <div class="print-report p-6" style="font-family:'Poppins', sans-serif; color:#14141C">
      <div style="border-bottom:3px solid ${C.orange}; padding-bottom:10px; margin-bottom:16px">
        <p style="font-size:11px; letter-spacing:2px; text-transform:uppercase; color:${C.rust}">Departamento de Jovens · ADVEC</p>
        <h1 class="headline" style="font-size:28px; margin:0">CONNECT — ADVEC MACEIÓ</h1>
        <p style="font-size:13px">Relatório de Vendas da Cantina — ${formatDateDisplay(date)}</p>
      </div>

      <table style="width:100%; font-size:12px; margin-bottom:16px; border-collapse:collapse">
        <tbody>
          <tr><td style="padding:4px 0">Total de vendas</td><td style="text-align:right; font-weight:700">${formatBRL(totals.revenue)}</td></tr>
          <tr><td style="padding:4px 0">Custo total</td><td style="text-align:right">${formatBRL(totals.cost)}</td></tr>
          <tr><td style="padding:4px 0; font-weight:700">Lucro do dia</td><td style="text-align:right; font-weight:700; color:${C.orange}">${formatBRL(totals.profit)}</td></tr>
          <tr><td style="padding:4px 0">Itens vendidos</td><td style="text-align:right">${sales.reduce((a, s) => a + s.qty, 0)}</td></tr>
        </tbody>
      </table>

      <p style="font-weight:700; font-size:13px; margin-bottom:6px">Por forma de pagamento</p>
      <table style="width:100%; font-size:12px; margin-bottom:16px; border-collapse:collapse">
        <tbody>
          ${PAYMENTS.map(p => `
            <tr><td style="padding:3px 0">${p.label}</td><td style="text-align:right">${formatBRL(totals.byPayment[p.id])}</td></tr>
          `).join('')}
        </tbody>
      </table>

      <p style="font-weight:700; font-size:13px; margin-bottom:6px">Itens vendidos</p>
      <table style="width:100%; font-size:11px; border-collapse:collapse">
        <thead>
          <tr style="border-bottom:1px solid #ccc">
            <th style="text-align:left; padding:4px 0">Produto</th>
            <th style="text-align:center">Qtd</th>
            <th style="text-align:right">Unit.</th>
            <th style="text-align:right">Total</th>
            <th style="text-align:right">Pagamento</th>
          </tr>
        </thead>
        <tbody>
          ${sales.map(s => `
            <tr style="border-bottom:1px solid #eee">
              <td style="padding:4px 0">${esc(s.productName)}</td>
              <td style="text-align:center">${s.qty}</td>
              <td style="text-align:right">${formatBRL(s.unitPrice)}</td>
              <td style="text-align:right">${formatBRL(s.unitPrice * s.qty)}</td>
              <td style="text-align:right">${paymentLabel(s.payment)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>

      <p style="margin-top:30px; font-size:10px; text-align:center; color:#888">
        Connect — ADVEC Maceió · Cantina · desenvolvido por Nayane Santana
      </p>
    </div>
  `;
}

/* ---------- modals ---------- */
let saleModalQty = 1;
let saleModalPayment = null;

function SaleModal() {
  const product = state.saleTarget;
  if (!product) return '';
  return `
    <div id="sale-modal-overlay" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center" style="background:rgba(20,20,28,0.55)">
      <div class="w-full sm:max-w-sm rounded-t-3xl sm:rounded-3xl p-5" style="background:#fff" onclick="event.stopPropagation()">
        <div class="flex justify-between items-start mb-4">
          <div>
            <p class="text-base font-bold" style="color:${C.navy}">${esc(product.name)}</p>
            <p class="text-sm font-semibold" style="color:${C.orange}">${formatBRL(product.salePrice)} / un.</p>
          </div>
          <button id="close-sale-modal"><i data-lucide="x" width="20" height="20" style="color:#999"></i></button>
        </div>

        <p class="text-xs font-medium text-stone-500 mb-2">Quantidade</p>
        <div class="flex items-center gap-4 mb-5">
          <button id="qty-minus" class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#F2ECDD"><i data-lucide="minus" width="16" height="16" style="color:${C.navy}"></i></button>
          <span id="qty-display" class="text-xl font-bold w-8 text-center" style="color:${C.navy}">${saleModalQty}</span>
          <button id="qty-plus" class="w-10 h-10 rounded-full flex items-center justify-center" style="background:#F2ECDD"><i data-lucide="plus" width="16" height="16" style="color:${C.navy}"></i></button>
        </div>

        <p class="text-xs font-medium text-stone-500 mb-2">Forma de pagamento</p>
        <div class="grid grid-cols-2 gap-2 mb-5">
          ${PAYMENTS.map(p => {
            const active = saleModalPayment === p.id;
            return `
              <button data-payment="${p.id}" class="payment-btn flex items-center gap-2 rounded-xl px-3 py-2.5 border" style="border-color:${active ? C.orange : '#EEE3CE'}; background:${active ? '#FDF1E4' : '#fff'}">
                <i data-lucide="${p.icon}" width="16" height="16" style="color:${active ? C.orange : '#888'}"></i>
                <span class="text-sm" style="color:${active ? C.orange : C.navy}">${p.label}</span>
              </button>
            `;
          }).join('')}
        </div>

        <div class="flex justify-between items-center mb-4">
          <span class="text-sm text-stone-500">Total</span>
          <span id="sale-total" class="text-lg font-bold" style="color:${C.navy}">${formatBRL(product.salePrice * saleModalQty)}</span>
        </div>

        <button id="confirm-sale" ${!saleModalPayment ? 'disabled' : ''} class="w-full py-3 rounded-2xl text-white font-semibold disabled:opacity-40" style="background:${HEADER_GRADIENT}">
          Adicionar venda
        </button>
      </div>
    </div>
  `;
}

function ProductModal() {
  const product = state.productModal;
  if (product === null) return '';
  return `
    <div id="product-modal-overlay" class="fixed inset-0 z-50 flex items-end sm:items-center justify-center" style="background:rgba(20,20,28,0.55)">
      <div class="w-full sm:max-w-sm rounded-t-3xl sm:rounded-3xl p-5" style="background:#fff" onclick="event.stopPropagation()">
        <div class="flex justify-between items-center mb-4">
          <p class="text-base font-bold" style="color:${C.navy}">${product.id ? 'Editar produto' : 'Novo produto'}</p>
          <button id="close-product-modal"><i data-lucide="x" width="20" height="20" style="color:#999"></i></button>
        </div>

        <label class="text-xs font-medium text-stone-500">Nome do produto</label>
        <input id="pm-name" value="${esc(product.name || '')}" placeholder="Ex: Coxinha"
          class="w-full mt-1 mb-3 px-3 py-2.5 rounded-xl border text-sm" style="border-color:#EEE3CE" />

        <label class="text-xs font-medium text-stone-500">Preço de custo (opcional)</label>
        <input id="pm-cost" value="${product.costPrice ?? ''}" type="number" inputmode="decimal" placeholder="0,00"
          class="w-full mt-1 mb-3 px-3 py-2.5 rounded-xl border text-sm" style="border-color:#EEE3CE" />

        <label class="text-xs font-medium text-stone-500">Preço de venda de hoje</label>
        <input id="pm-sale" value="${product.salePrice ?? ''}" type="number" inputmode="decimal" placeholder="0,00"
          class="w-full mt-1 mb-5 px-3 py-2.5 rounded-xl border text-sm" style="border-color:#EEE3CE" />

        <button id="save-product-btn" class="w-full py-3 rounded-2xl text-white font-semibold" style="background:${HEADER_GRADIENT}">
          Salvar produto
        </button>
      </div>
    </div>
  `;
}

/* ---------- main render ---------- */
function render() {
  const root = document.getElementById('root');

  const tabContent = state.tab === 'vendas' ? VendasTab()
    : state.tab === 'produtos' ? ProdutosTab()
    : state.tab === 'relatorio' ? RelatorioTab()
    : HistoricoTab();

  root.innerHTML = `
    <div class="min-h-screen flex flex-col" style="background:${C.paper}; font-family:'Poppins', sans-serif">
      <div class="app-shell flex flex-col min-h-screen">
        ${Header()}

        ${state.loadError ? `
          <div class="mx-4 mt-3 text-xs rounded-lg px-3 py-2" style="background:#FCE8E0; color:#8C2F14">
            Não foi possível carregar os dados salvos. Os dados desta sessão podem não estar completos.
          </div>
        ` : ''}

        <main class="flex-1 overflow-y-auto px-4 pt-4 pb-28">
          ${tabContent}
        </main>

        ${BottomNav()}
      </div>

      ${PrintableReport()}
      ${SaleModal()}
      ${ProductModal()}

      ${state.toast ? `
        <div class="fixed left-1/2 bottom-24 -translate-x-1/2 z-50 text-white text-sm px-4 py-2 rounded-full shadow-lg flex items-center gap-2" style="background:${C.navy}">
          <i data-lucide="check-circle-2" width="16" height="16" style="color:${C.orangeLight}"></i> ${esc(state.toast)}
        </div>
      ` : ''}
    </div>
  `;

  renderIcons();
  attachHandlers();
}

/* ---------- event handlers ---------- */
function attachHandlers() {
  // bottom nav
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.tab = btn.dataset.tab; render(); });
  });

  // go to products (empty state link)
  const goProducts = document.getElementById('go-products-btn');
  if (goProducts) goProducts.addEventListener('click', () => { state.tab = 'produtos'; render(); });

  // pick product -> open sale modal
  document.querySelectorAll('[data-pick-product]').forEach(btn => {
    btn.addEventListener('click', () => {
      const product = state.products.find(p => p.id === btn.dataset.pickProduct);
      state.saleTarget = product;
      saleModalQty = 1;
      saleModalPayment = null;
      render();
    });
  });

  // delete sale
  document.querySelectorAll('[data-delete-sale]').forEach(btn => {
    btn.addEventListener('click', () => removeSale(btn.dataset.deleteSale));
  });

  // add product
  const addProductBtn = document.getElementById('add-product-btn');
  if (addProductBtn) addProductBtn.addEventListener('click', () => { state.productModal = {}; render(); });

  // edit / remove product
  document.querySelectorAll('[data-edit-product]').forEach(btn => {
    btn.addEventListener('click', () => {
      const product = state.products.find(p => p.id === btn.dataset.editProduct);
      state.productModal = product;
      render();
    });
  });
  document.querySelectorAll('[data-remove-product]').forEach(btn => {
    btn.addEventListener('click', () => removeProduct(btn.dataset.removeProduct));
  });

  // relatorio: date shift
  const shiftPrev = document.getElementById('shift-prev');
  const shiftNext = document.getElementById('shift-next');
  const goToday = document.getElementById('go-today');
  if (shiftPrev) shiftPrev.addEventListener('click', () => shiftDate(-1));
  if (shiftNext) shiftNext.addEventListener('click', () => shiftDate(1));
  if (goToday) goToday.addEventListener('click', () => { state.selectedDate = todayStr(); render(); });

  // print
  const printBtn = document.getElementById('print-btn');
  if (printBtn) printBtn.addEventListener('click', () => window.print());

  // historico: open date
  document.querySelectorAll('[data-open-date]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.selectedDate = btn.dataset.openDate;
      state.tab = 'relatorio';
      render();
    });
  });

  // sale modal
  const saleOverlay = document.getElementById('sale-modal-overlay');
  if (saleOverlay) {
    saleOverlay.addEventListener('click', () => { state.saleTarget = null; render(); });
    document.getElementById('close-sale-modal').addEventListener('click', () => { state.saleTarget = null; render(); });

    document.getElementById('qty-minus').addEventListener('click', () => {
      saleModalQty = Math.max(1, saleModalQty - 1);
      updateSaleModalPartial();
    });
    document.getElementById('qty-plus').addEventListener('click', () => {
      saleModalQty = saleModalQty + 1;
      updateSaleModalPartial();
    });

    document.querySelectorAll('.payment-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        saleModalPayment = btn.dataset.payment;
        render();
      });
    });

    const confirmBtn = document.getElementById('confirm-sale');
    if (confirmBtn) {
      confirmBtn.addEventListener('click', () => {
        if (!saleModalPayment) return;
        addSale(state.saleTarget, saleModalQty, saleModalPayment);
      });
    }
  }

  // product modal
  const productOverlay = document.getElementById('product-modal-overlay');
  if (productOverlay) {
    productOverlay.addEventListener('click', () => { state.productModal = null; render(); });
    document.getElementById('close-product-modal').addEventListener('click', () => { state.productModal = null; render(); });

    const saveBtn = document.getElementById('save-product-btn');
    saveBtn.addEventListener('click', () => {
      const name = document.getElementById('pm-name').value;
      const costPrice = document.getElementById('pm-cost').value;
      const salePrice = document.getElementById('pm-sale').value;
      if (!name.trim() || salePrice === '') return;
      saveProduct({
        id: state.productModal.id,
        name: name.trim(),
        costPrice: Number(costPrice) || 0,
        salePrice: Number(salePrice),
      });
    });
  }
}

// lightweight partial update for qty stepper so the modal doesn't lose focus/flicker
function updateSaleModalPartial() {
  const qtyDisplay = document.getElementById('qty-display');
  const saleTotal = document.getElementById('sale-total');
  if (qtyDisplay) qtyDisplay.textContent = saleModalQty;
  if (saleTotal) saleTotal.textContent = formatBRL(state.saleTarget.salePrice * saleModalQty);
}

/* ---------- live sync: Realtime Database avisa na hora quando alguém altera os dados ---------- */
function startSync() {
  REF_PRODUCTS.on('value', snap => {
    if (state.saleTarget || state.productModal) return; // não atrapalha quem está editando
    if (!snap.exists()) return;
    const items = snap.val().items || [];
    if (JSON.stringify(items) !== JSON.stringify(state.products)) {
      state.products = items;
      render();
    }
  }, err => console.error('Erro ao sincronizar produtos:', err));

  REF_SALES.on('value', snap => {
    if (state.saleTarget || state.productModal) return;
    if (!snap.exists()) return;
    const items = snap.val().items || [];
    if (JSON.stringify(items) !== JSON.stringify(state.sales)) {
      state.sales = items;
      render();
    }
  }, err => console.error('Erro ao sincronizar vendas:', err));
}

/* ---------- init ---------- */
async function init() {
  document.getElementById('loading-screen').classList.remove('hidden');
  document.getElementById('root').classList.add('hidden');

  try {
    state.products = (await storage.get('cantina_products')) || [];
    state.sales = (await storage.get('cantina_sales_all')) || [];
  } catch (e) {
    state.loadError = true;
  }

  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('root').classList.remove('hidden');
  render();

  startSync();
}

init();
</script>
</body>
</html>
