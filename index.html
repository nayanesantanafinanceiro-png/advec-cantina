<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Controle de Recebimentos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
  :root{
    --ink:#10141A;
    --panel:#171D26;
    --panel-alt:#1E2530;
    --border:#2A3341;
    --text:#E7EBF0;
    --text-muted:#8B96A6;
    --teal:#35D0A0;
    --teal-dim:rgba(53,208,160,.14);
    --amber:#E8A94D;
    --amber-dim:rgba(232,169,77,.14);
    --red:#F2665C;
    --red-dim:rgba(242,102,92,.14);
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--ink);
    color:var(--text);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--teal-dim);}
  h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'IBM Plex Mono',monospace; font-variant-numeric: tabular-nums;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}

  #app{display:flex;min-height:100vh;}

  /* Sidebar */
  .sidebar{
    width:220px;flex:none;
    background:var(--panel);
    border-right:1px solid var(--border);
    display:flex;flex-direction:column;
    padding:20px 14px;
    position:sticky;top:0;height:100vh;
  }
  .brand{display:flex;align-items:center;gap:9px;padding:4px 8px 22px;}
  .brand-mark{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--teal),#1a8f6c);flex:none;position:relative;}
  .brand-mark::after{content:'';position:absolute;inset:7px;border:1.6px solid var(--ink);border-radius:3px;}
  .brand-name{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;letter-spacing:.2px;}
  .brand-name small{display:block;font-family:'Inter',sans-serif;font-weight:400;font-size:10.5px;color:var(--text-muted);letter-spacing:.4px;text-transform:uppercase;margin-top:1px;}

  nav.tabs{display:flex;flex-direction:column;gap:2px;margin-top:6px;}
  nav.tabs button{
    display:flex;align-items:center;gap:10px;
    background:none;border:none;color:var(--text-muted);
    padding:9px 10px;border-radius:8px;font-size:13.5px;font-weight:500;
    text-align:left;transition:background .12s, color .12s;
  }
  nav.tabs button svg{width:16px;height:16px;flex:none;opacity:.85;}
  nav.tabs button:hover{background:var(--panel-alt);color:var(--text);}
  nav.tabs button.active{background:var(--teal-dim);color:var(--teal);}

  .sidebar-foot{margin-top:auto;padding-top:14px;border-top:1px solid var(--border);}
  .conn-status{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--text-muted);padding:6px 8px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--teal);flex:none;}
  .dot.off{background:var(--red);}

  /* Main */
  main{flex:1;min-width:0;padding:26px 32px 60px;}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap;}
  .page-head h1{font-size:21px;margin:0 0 4px;font-weight:600;}
  .page-head .sub{color:var(--text-muted);font-size:13px;}

  .btn{
    background:var(--panel-alt);border:1px solid var(--border);color:var(--text);
    padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;
    display:inline-flex;align-items:center;gap:7px;transition:border-color .12s, background .12s;
  }
  .btn:hover{border-color:var(--teal);}
  .btn.primary{background:var(--teal);color:#0B1712;border-color:var(--teal);font-weight:600;}
  .btn.primary:hover{background:#2ec294;}
  .btn.ghost{background:none;border-color:transparent;color:var(--text-muted);}
  .btn.ghost:hover{color:var(--text);background:var(--panel-alt);}
  .btn.danger{color:var(--red);}
  .btn.danger:hover{border-color:var(--red);}
  .btn:disabled{opacity:.45;cursor:default;}

  .card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}

  /* KPIs */
  .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
  .kpi{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;}
  .kpi .label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
  .kpi .value{font-family:'IBM Plex Mono',monospace;font-size:19px;font-weight:600;}
  .kpi .value.teal{color:var(--teal);}
  .kpi .value.red{color:var(--red);}
  .kpi .foot{font-size:11px;color:var(--text-muted);margin-top:5px;}

  /* Month nav */
  .month-nav{display:flex;align-items:center;gap:10px;}
  .month-nav button{background:var(--panel-alt);border:1px solid var(--border);color:var(--text);width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
  .month-nav button:hover{border-color:var(--teal);}
  .month-label{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14.5px;min-width:150px;text-align:center;text-transform:capitalize;}

  /* Ranking */
  .rank-row{display:grid;grid-template-columns:22px 150px 1fr 100px 90px;align-items:center;gap:14px;padding:11px 4px;border-bottom:1px solid var(--border);}
  .rank-row:last-child{border-bottom:none;}
  .rank-idx{color:var(--text-muted);font-size:12px;font-family:'IBM Plex Mono',monospace;}
  .rank-name{font-size:13.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rank-bar-wrap{height:8px;background:var(--panel-alt);border-radius:5px;overflow:hidden;position:relative;}
  .rank-bar{height:100%;background:linear-gradient(90deg,var(--teal),#1f9d78);border-radius:5px;}
  .rank-val{font-family:'IBM Plex Mono',monospace;font-size:12.5px;text-align:right;}
  .rank-pct{font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:var(--text-muted);text-align:right;}

  /* Calendar heat grid */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px;}
  .cal-dow{font-size:10px;color:var(--text-muted);text-align:center;text-transform:uppercase;letter-spacing:.4px;padding-bottom:2px;}
  .cal-cell{
    min-height:46px; border-radius:8px; border:1px solid var(--border);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
    font-family:'IBM Plex Mono',monospace;color:var(--text-muted);cursor:pointer;
    background:var(--panel-alt); position:relative; transition:border-color .12s, transform .12s;
  }
  .cal-cell:not(.empty):hover{border-color:var(--teal);transform:translateY(-1px);}
  .cal-cell .cal-day{font-size:12.5px;font-weight:500;}
  .cal-cell .cal-val{font-size:9px;opacity:.8;letter-spacing:.2px;}
  .cal-cell.empty{visibility:hidden;cursor:default;}
  .cal-cell.today{box-shadow:inset 0 0 0 1.5px var(--teal);}
  .cal-cell.full{background:var(--teal-dim);color:var(--teal);border-color:transparent;}
  .cal-cell.partial{background:var(--amber-dim);color:var(--amber);border-color:transparent;}
  .cal-cell.issue{background:var(--red-dim);color:var(--red);border-color:transparent;}
  .cal-legend{display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--text-muted);flex-wrap:wrap;}
  .cal-legend span{display:inline-flex;align-items:center;gap:6px;}
  .cal-legend i{width:9px;height:9px;border-radius:3px;display:inline-block;}

  /* Tables */
  table.data{width:100%;border-collapse:collapse;font-size:13px;}
  table.data th{
    text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;
    color:var(--text-muted);font-weight:600;padding:0 8px 10px;white-space:nowrap;
  }
  table.data td{padding:7px 8px;border-top:1px solid var(--border);vertical-align:middle;}
  table.data tr:hover td{background:rgba(255,255,255,.015);}
  table.data input[type=text], table.data input[type=number]{
    width:100%;background:var(--panel-alt);border:1px solid var(--border);color:var(--text);
    border-radius:6px;padding:6px 8px;font-size:12.5px;
  }
  table.data input.mono{font-family:'IBM Plex Mono',monospace;text-align:right;}
  table.data input:focus, select:focus{outline:none;border-color:var(--teal);}
  table.data input.saved{border-color:var(--teal);}
  td.readonly{color:var(--text-muted);}
  .val-computed{font-family:'IBM Plex Mono',monospace;text-align:right;padding:6px 8px;display:block;}

  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:4px 9px;border-radius:20px;white-space:nowrap;}
  .badge.ok{background:var(--teal-dim);color:var(--teal);}
  .badge.divergente{background:var(--red-dim);color:var(--red);}
  .badge.sem_relatorio{background:var(--panel-alt);color:var(--text-muted);}
  .badge.pendente{background:var(--amber-dim);color:var(--amber);}
  .badge i{width:6px;height:6px;border-radius:50%;background:currentColor;}

  .row-name-cell{display:flex;flex-direction:column;gap:2px;}
  .row-name-cell b{font-size:13px;font-weight:600;}
  .row-name-cell small{font-size:10.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px;}

  select.op-select{background:var(--panel-alt);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:6px 8px;font-size:12px;width:100%;}

  .empty-state{padding:50px 20px;text-align:center;color:var(--text-muted);}
  .empty-state h3{color:var(--text);font-size:15px;margin-bottom:6px;}
  .empty-state p{font-size:13px;margin:0 0 16px;}

  /* Bancos view */
  .banco-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;display:grid;grid-template-columns:1fr 160px 200px 90px 34px;gap:14px;align-items:center;}
  .banco-card input[type=text]{background:var(--panel-alt);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:8px 10px;font-size:13px;width:100%;}
  .field-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px;display:block;}
  .weekday-picker{display:flex;gap:4px;}
  .weekday-picker button{
    width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--panel-alt);
    color:var(--text-muted);font-size:10.5px;font-weight:600;
  }
  .weekday-picker button.on{background:var(--teal-dim);color:var(--teal);border-color:transparent;}
  .toggle{width:38px;height:22px;border-radius:20px;background:var(--panel-alt);border:1px solid var(--border);position:relative;flex:none;}
  .toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--text-muted);transition:.15s;}
  .toggle.on{background:var(--teal-dim);border-color:var(--teal);}
  .toggle.on::after{background:var(--teal);left:18px;}

  .filters-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
  .filters-row select, .filters-row input[type=date]{
    background:var(--panel-alt);border:1px solid var(--border);color:var(--text);
    border-radius:8px;padding:8px 11px;font-size:12.5px;
  }

  /* Custom date picker */
  .date-picker-wrap{position:relative;}
  .date-picker-btn{
    background:var(--panel-alt);border:1px solid var(--border);color:var(--text);
    padding:8px 14px;border-radius:8px;font-size:12.5px;font-weight:500;
    display:inline-flex;align-items:center;gap:9px;transition:border-color .12s;
  }
  .date-picker-btn:hover{border-color:var(--teal);}
  .date-picker-btn svg{color:var(--teal);flex:none;}
  .date-picker-pop{
    position:absolute;top:calc(100% + 8px);right:0;width:272px;z-index:30;
    background:var(--panel);border:1px solid var(--border);border-radius:12px;
    padding:14px;box-shadow:0 16px 36px rgba(0,0,0,.45);
  }
  .pk-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .pk-nav{background:var(--panel-alt);border:1px solid var(--border);color:var(--text);width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;}
  .pk-nav:hover{border-color:var(--teal);}
  .pk-month{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:12.5px;text-transform:capitalize;}
  .pk-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .pk-dow{font-size:9px;color:var(--text-muted);text-align:center;text-transform:uppercase;padding-bottom:2px;}
  .pk-cell{
    aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;
    font-size:11.5px;font-family:'IBM Plex Mono',monospace;border-radius:7px;
    color:var(--text-muted);cursor:pointer;background:var(--panel-alt);
    border:1px solid transparent;transition:border-color .1s;
  }
  .pk-cell:hover{border-color:var(--teal);}
  .pk-cell.empty{visibility:hidden;cursor:default;}
  .pk-cell.today{box-shadow:inset 0 0 0 1.5px var(--teal);color:var(--teal);}
  .pk-cell.selected{background:var(--teal);color:#0B1712;font-weight:600;border-color:transparent;}

  .setup-screen{max-width:640px;margin:60px auto;padding:0 20px;}
  .setup-screen code{background:var(--panel-alt);padding:2px 6px;border-radius:5px;font-family:'IBM Plex Mono',monospace;font-size:12.5px;}
  .setup-screen ol{padding-left:20px;line-height:1.9;font-size:13.5px;color:var(--text-muted);}
  .setup-screen li b{color:var(--text);}

  .toast{
    position:fixed;bottom:22px;right:22px;background:var(--panel);border:1px solid var(--border);
    padding:11px 16px;border-radius:9px;font-size:12.5px;display:flex;align-items:center;gap:8px;
    box-shadow:0 8px 24px rgba(0,0,0,.35); opacity:0; transform:translateY(8px); transition:.2s;
    pointer-events:none; z-index:50;
  }
  .toast.show{opacity:1;transform:translateY(0);}

  @media(max-width:920px){
    .kpi-row{grid-template-columns:repeat(2,1fr);}
    .sidebar{width:70px;}
    .brand-name, nav.tabs button span.label, .conn-status span{display:none;}
    main{padding:20px;}
    .banco-card{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<div id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* =========================================================
   CONFIGURAÇÃO DO SUPABASE
   Cole aqui a URL e a chave "anon public" do seu projeto
   (Supabase > Project Settings > API).
   ========================================================= */
const SUPABASE_URL = "https://qxtoksqswgragouayfhu.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_1Sxf-g15emY4npzjPC9U-A_PGWdh0hq";

const CONFIGURED = !SUPABASE_URL.startsWith("COLE_AQUI") && !SUPABASE_ANON_KEY.startsWith("COLE_AQUI");
let sb = null;
if (CONFIGURED) {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

const DOW = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];

const state = {
  view: 'dashboard',
  bancos: [],
  lancamentosMonth: {},   // key `${bancoId}_${date}` -> lancamento, for the loaded month
  monthLoaded: null,      // "YYYY-MM"
  selectedDate: todayISO(),
  dashMonth: { y: new Date().getFullYear(), m: new Date().getMonth() },
  connected: CONFIGURED,
};

function icoCalendar(){return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="width:15px;height:15px;"><rect x="3.5" y="5" width="17" height="15.5" rx="2.5"/><path d="M3.5 9.5h17"/><path d="M8 3v4M16 3v4"/></svg>`;}
function fmtDateLabel(iso){
  const d = dateObj(iso);
  const dowLong = ['Domingo','Segunda','Terça','Quarta','Quinta','Sexta','Sábado'][d.getDay()];
  return `${dowLong}, ${d.getDate()} de ${MESES[d.getMonth()]} de ${d.getFullYear()}`;
}

let pickerViewMonth = null;

function openDatePicker(main){
  const d = dateObj(state.selectedDate);
  pickerViewMonth = {y:d.getFullYear(), m:d.getMonth()};
  renderPickerPopover(main);
  main.querySelector('#datePickPop').hidden = false;
}

function renderPickerPopover(main){
  const {y,m} = pickerViewMonth;
  const daysInMonth = new Date(y,m+1,0).getDate();
  const firstDow = new Date(y,m,1).getDay();
  const today = todayISO();
  const sel = state.selectedDate;
  let cells = '';
  for(let i=0;i<firstDow;i++) cells += `<div class="pk-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const iso = ymKey(y,m)+'-'+String(d).padStart(2,'0');
    let cls='';
    if (iso===today) cls+=' today';
    if (iso===sel) cls+=' selected';
    cells += `<div class="pk-cell ${cls}" data-date="${iso}">${d}</div>`;
  }
  const pop = main.querySelector('#datePickPop');
  pop.innerHTML = `
    <div class="pk-head">
      <button class="pk-nav" id="pkPrev" type="button">‹</button>
      <div class="pk-month">${MESES[m]} ${y}</div>
      <button class="pk-nav" id="pkNext" type="button">›</button>
    </div>
    <div class="pk-grid">
      ${DOW.map(d=>`<div class="pk-dow">${d[0]}</div>`).join('')}
      ${cells}
    </div>
    <button class="btn ghost" id="pkToday" type="button" style="width:100%;justify-content:center;margin-top:10px;">Hoje</button>
  `;
  pop.querySelector('#pkPrev').onclick = (e)=>{ e.stopPropagation(); shiftPicker(-1, main); };
  pop.querySelector('#pkNext').onclick = (e)=>{ e.stopPropagation(); shiftPicker(1, main); };
  pop.querySelector('#pkToday').onclick = (e)=>{
    e.stopPropagation();
    state.selectedDate = todayISO();
    render();
  };
  pop.querySelectorAll('.pk-cell[data-date]').forEach(c=>{
    c.onclick = (e)=>{
      e.stopPropagation();
      state.selectedDate = c.dataset.date;
      render();
    };
  });
}

function shiftPicker(delta, main){
  let {y,m} = pickerViewMonth;
  m += delta;
  if (m<0){m=11;y--;} if (m>11){m=0;y++;}
  pickerViewMonth = {y,m};
  renderPickerPopover(main);
}

document.addEventListener('click', (e)=>{
  const wrap = document.getElementById('datePickWrap');
  if (wrap && !wrap.contains(e.target)){
    const pop = document.getElementById('datePickPop');
    if (pop) pop.hidden = true;
  }
});

function todayISO(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function fmtBRL(n){
  n = Number(n)||0;
  return n.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
}
function fmtBRLShort(n){
  n = Number(n)||0;
  if (Math.abs(n) >= 1000) return (n/1000).toFixed(1).replace('.0','').replace('.',',') + 'k';
  return n.toFixed(0);
}
function parseNum(v){
  if (typeof v === 'number') return v;
  if (!v) return 0;
  const n = parseFloat(String(v).replace(/\./g,'').replace(',','.'));
  return isNaN(n) ? 0 : n;
}
function toast(msg, isErr){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = isErr ? 'var(--red)' : 'var(--border)';
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(()=>t.classList.remove('show'), 2200);
}
function dateObj(iso){ const [y,m,d]=iso.split('-').map(Number); return new Date(y,m-1,d); }
function ymKey(y,m){ return y+'-'+String(m+1).padStart(2,'0'); }

/* ---------- Supabase helpers ---------- */
async function loadBancos(){
  const {data, error} = await sb.from('bancos').select('*').order('ordem',{ascending:true}).order('nome');
  if (error){ toast('Erro ao carregar bancos: '+error.message, true); return; }
  state.bancos = data || [];
}

async function loadMonth(y, m){
  const key = ymKey(y,m);
  const first = key+'-01';
  const lastDay = new Date(y, m+1, 0).getDate();
  const last = key+'-'+String(lastDay).padStart(2,'0');
  const {data, error} = await sb.from('lancamentos').select('*').gte('data',first).lte('data',last);
  if (error){ toast('Erro ao carregar lançamentos: '+error.message, true); return; }
  state.lancamentosMonth = {};
  (data||[]).forEach(l=>{ state.lancamentosMonth[l.banco_id+'_'+l.data] = l; });
  state.monthLoaded = key;
}

async function ensureMonthLoaded(y,m){
  if (state.monthLoaded !== ymKey(y,m)) await loadMonth(y,m);
}

async function upsertLancamento(bancoId, data, fields){
  const key = bancoId+'_'+data;
  const existing = state.lancamentosMonth[key] || {banco_id:bancoId, data};
  const merged = {...existing, ...fields};
  merged.valor_relatorio = parseNum(merged.valor_relatorio);
  merged.valor_debito = parseNum(merged.valor_debito);
  merged.valor_movimentacoes = parseNum(merged.valor_movimentacoes);
  const liquido = merged.valor_relatorio - merged.valor_debito;
  merged.status = computeStatus(merged);
  merged.updated_at = new Date().toISOString();
  delete merged.created_at;

  const payload = {
    banco_id: bancoId, data,
    valor_relatorio: merged.valor_relatorio,
    valor_debito: merged.valor_debito,
    observacoes: merged.observacoes || '',
    valor_movimentacoes: merged.valor_movimentacoes,
    observacoes_movimentacoes: merged.observacoes_movimentacoes || '',
    status: merged.status,
    updated_at: merged.updated_at,
  };
  const {data:ret, error} = await sb.from('lancamentos').upsert(payload, {onConflict:'banco_id,data'}).select().single();
  if (error){ toast('Erro ao salvar: '+error.message, true); return null; }
  state.lancamentosMonth[key] = ret;
  return ret;
}

function computeStatus(l){
  const rel = parseNum(l.valor_relatorio), deb = parseNum(l.valor_debito), mov = parseNum(l.valor_movimentacoes);
  if (rel===0 && deb===0 && mov===0) return 'pendente';
  const liquido = rel-deb;
  if (mov===0 && liquido!==0) return 'pendente';
  if (Math.abs(mov-liquido) < 0.01) return 'ok';
  return 'divergente';
}

/* ---------- Scheduling logic ---------- */
function bancoOcorreEm(banco, iso){
  const d = dateObj(iso);
  if (banco.periodicidade === 'diaria') return true;
  if (banco.periodicidade === 'semanal') return (banco.dias_semana||[]).includes(d.getDay());
  if (banco.periodicidade === 'mensal') return d.getDate() === banco.dia_mes;
  return false;
}

/* ---------- Dashboard ---------- */
async function renderDashboard(main){
  main.innerHTML = `<div class="empty-state">Carregando…</div>`;
  if (state.bancos.length===0) await loadBancos();
  const {y,m} = state.dashMonth;
  await ensureMonthLoaded(y,m);

  const lancs = Object.values(state.lancamentosMonth);
  const totRel = lancs.reduce((s,l)=>s+parseNum(l.valor_relatorio),0);
  const totDeb = lancs.reduce((s,l)=>s+parseNum(l.valor_debito),0);
  const totLiq = totRel-totDeb;
  const totMov = lancs.reduce((s,l)=>s+parseNum(l.valor_movimentacoes),0);
  const diverg = lancs.filter(l=>l.status==='divergente').length;

  // ranking per bank
  const perBanco = {};
  lancs.forEach(l=>{
    perBanco[l.banco_id] = perBanco[l.banco_id] || {liquido:0, mov:0};
    perBanco[l.banco_id].liquido += parseNum(l.valor_relatorio)-parseNum(l.valor_debito);
    perBanco[l.banco_id].mov += parseNum(l.valor_movimentacoes);
  });
  const ranking = state.bancos
    .map(b=>({banco:b, ...( perBanco[b.id] || {liquido:0,mov:0} )}))
    .filter(r=>r.liquido!==0 || r.mov!==0)
    .sort((a,b)=>b.liquido-a.liquido);
  const maxLiq = Math.max(1, ...ranking.map(r=>Math.abs(r.liquido)));

  const daysInMonth = new Date(y,m+1,0).getDate();
  const firstDow = new Date(y,m,1).getDay();
  const today = todayISO();

  let calCells = '';
  for(let i=0;i<firstDow;i++) calCells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const iso = ymKey(y,m)+'-'+String(d).padStart(2,'0');
    const scheduled = state.bancos.filter(b=>b.ativo && bancoOcorreEm(b, iso));
    const entries = scheduled.map(b=>state.lancamentosMonth[b.id+'_'+iso]).filter(Boolean);
    const allEntriesForDay = Object.values(state.lancamentosMonth).filter(l=>l.data===iso);
    const dayTotal = allEntriesForDay.reduce((s,l)=>s+parseNum(l.valor_movimentacoes),0);
    const hasIssue = allEntriesForDay.some(e=>e.status==='divergente');
    let cls = '';
    if (scheduled.length>0){
      if (hasIssue) cls='issue';
      else if (entries.length===0) cls='';
      else if (entries.length < scheduled.length) cls='partial';
      else cls='full';
    } else if (hasIssue) cls='issue';
    if (iso===today) cls += ' today';
    const tip = scheduled.length ? `${entries.length}/${scheduled.length} bancos lançados` : 'Nenhum banco previsto';
    const valHtml = dayTotal>0 ? `<span class="cal-val">${fmtBRLShort(dayTotal)}</span>` : '';
    calCells += `<div class="cal-cell ${cls}" data-date="${iso}" title="${tip}"><span class="cal-day">${d}</span>${valHtml}</div>`;
  }

  main.innerHTML = `
    <div class="page-head">
      <div>
        <h1>Início</h1>
        <div class="sub">Visão geral de recebimentos do mês</div>
      </div>
      <div class="month-nav">
        <button id="mPrev">‹</button>
        <div class="month-label">${MESES[m]} ${y}</div>
        <button id="mNext">›</button>
        <button class="btn ghost" id="mToday" style="margin-left:4px;">Hoje</button>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi"><div class="label">Valor relatório</div><div class="value mono">R$ ${fmtBRL(totRel)}</div></div>
      <div class="kpi"><div class="label">Valor débito</div><div class="value mono">R$ ${fmtBRL(totDeb)}</div></div>
      <div class="kpi"><div class="label">Valor líquido</div><div class="value mono teal">R$ ${fmtBRL(totLiq)}</div></div>
      <div class="kpi"><div class="label">Movimentado (recebido)</div><div class="value mono">R$ ${fmtBRL(totMov)}</div></div>
      <div class="kpi"><div class="label">Divergências no mês</div><div class="value mono ${diverg>0?'red':''}">${diverg}</div><div class="foot">lançamentos a checar</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1.35fr 1fr;gap:16px;align-items:start;">
      <div class="card">
        <h2 style="font-size:14px;margin:0 0 4px;">Rentabilidade por banco</h2>
        <div class="sub" style="margin-bottom:10px;">Valor líquido recebido no mês, por banco</div>
        ${ranking.length===0 ? `<div class="empty-state" style="padding:26px 0;"><p>Nenhum lançamento neste mês ainda.</p></div>` :
          ranking.map((r,i)=>{
            const pct = totLiq!==0 ? (r.liquido/totLiq*100) : 0;
            const barPct = Math.max(2, Math.abs(r.liquido)/maxLiq*100);
            return `<div class="rank-row">
              <div class="rank-idx">${String(i+1).padStart(2,'0')}</div>
              <div class="rank-name">${r.banco.nome}</div>
              <div class="rank-bar-wrap"><div class="rank-bar" style="width:${barPct}%"></div></div>
              <div class="rank-val">R$ ${fmtBRL(r.liquido)}</div>
              <div class="rank-pct">${pct.toFixed(1)}%</div>
            </div>`;
          }).join('')}
      </div>

      <div class="card">
        <h2 style="font-size:14px;margin:0 0 4px;">Calendário do mês</h2>
        <div class="sub" style="margin-bottom:6px;">Clique num dia para lançar valores</div>
        <div class="cal-grid">
          ${DOW.map(d=>`<div class="cal-dow">${d}</div>`).join('')}
          ${calCells}
        </div>
        <div class="cal-legend">
          <span><i style="background:var(--teal)"></i>completo</span>
          <span><i style="background:var(--amber)"></i>parcial</span>
          <span><i style="background:var(--red)"></i>divergência</span>
          <span><i style="background:transparent;border:1.5px solid var(--teal);"></i>hoje</span>
        </div>
      </div>
    </div>
  `;

  main.querySelector('#mPrev').onclick = ()=>{ shiftMonth(-1); };
  main.querySelector('#mNext').onclick = ()=>{ shiftMonth(1); };
  main.querySelector('#mToday').onclick = ()=>{
    const t = new Date();
    state.dashMonth = {y:t.getFullYear(), m:t.getMonth()};
    renderDashboard(document.getElementById('main'));
  };
  main.querySelectorAll('.cal-cell[data-date]').forEach(c=>{
    c.onclick = ()=>{ state.selectedDate = c.dataset.date; state.view='lancamento'; render(); };
  });
}

function shiftMonth(delta){
  let {y,m} = state.dashMonth;
  m += delta;
  if (m<0){m=11;y--;} if(m>11){m=0;y++;}
  state.dashMonth = {y,m};
  renderDashboard(document.getElementById('main'));
}

/* ---------- Lançamento diário ---------- */
async function renderLancamento(main){
  main.innerHTML = `<div class="empty-state">Carregando…</div>`;
  if (state.bancos.length===0) await loadBancos();
  const iso = state.selectedDate;
  const d = dateObj(iso);
  const y = d.getFullYear(), m = d.getMonth();
  await ensureMonthLoaded(y,m);

  const scheduled = state.bancos.filter(b=>b.ativo && bancoOcorreEm(b, iso));
  const extraIds = Object.keys(state.lancamentosMonth)
    .filter(k=>k.endsWith('_'+iso))
    .map(k=>k.split('_')[0])
    .filter(id=>!scheduled.some(b=>b.id===id));
  const extras = state.bancos.filter(b=>extraIds.includes(b.id));
  const rows = [...scheduled, ...extras];

  const outros = state.bancos.filter(b=>b.ativo && !rows.some(r=>r.id===b.id));

  main.innerHTML = `
    <div class="page-head">
      <div>
        <h1>Lançamento diário</h1>
        <div class="sub">Compare o relatório do banco com o valor que efetivamente caiu na conta</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <div class="date-picker-wrap" id="datePickWrap">
          <button class="date-picker-btn" id="datePickBtn" type="button">
            ${icoCalendar()}<span>${fmtDateLabel(iso)}</span>
          </button>
          <div class="date-picker-pop" id="datePickPop" hidden></div>
        </div>
        ${outros.length ? `<select id="addBanco" class="op-select" style="width:210px;"><option value="">+ Adicionar banco avulso</option>${outros.map(b=>`<option value="${b.id}">${b.nome}</option>`).join('')}</select>` : ''}
      </div>
    </div>

    ${rows.length===0 ? `
      <div class="card"><div class="empty-state">
        <h3>Nenhum banco previsto para este dia</h3>
        <p>Use o campo acima para adicionar um lançamento avulso, ou ajuste a periodicidade em "Bancos".</p>
      </div></div>
    ` : `
    <div class="card" style="overflow-x:auto;">
      <table class="data" id="tbl">
        <thead><tr>
          <th style="min-width:170px;">Banco</th>
          <th style="min-width:120px;">Valor relatório</th>
          <th style="min-width:110px;">Valor débito</th>
          <th style="min-width:110px;">Valor líquido</th>
          <th style="min-width:150px;">Observações</th>
          <th style="min-width:130px;">Nas movimentações</th>
          <th style="min-width:150px;">Obs. movimentações</th>
          <th style="min-width:100px;">Status</th>
        </tr></thead>
        <tbody>
          ${rows.map(b=>rowHtml(b, iso)).join('')}
        </tbody>
      </table>
    </div>
    `}
  `;

  main.querySelector('#datePickBtn').onclick = (e)=>{
    e.stopPropagation();
    const pop = main.querySelector('#datePickPop');
    if (pop.hidden) openDatePicker(main); else pop.hidden = true;
  };
  const addSel = main.querySelector('#addBanco');
  if (addSel) addSel.onchange = async (e)=>{
    if (!e.target.value) return;
    await upsertLancamento(e.target.value, iso, {valor_relatorio:0,valor_debito:0,valor_movimentacoes:0,observacoes:'',observacoes_movimentacoes:''});
    render();
  };

  rows.forEach(b=>wireRow(b, iso));
}

function rowHtml(b, iso){
  const l = state.lancamentosMonth[b.id+'_'+iso] || {};
  const rel = l.valor_relatorio ?? '';
  const deb = l.valor_debito ?? '';
  const liquido = (parseNum(rel)-parseNum(deb));
  const mov = l.valor_movimentacoes ?? '';
  const status = l.status || (rel!=='' ? computeStatus({valor_relatorio:rel,valor_debito:deb,valor_movimentacoes:mov}) : 'pendente');
  const badgeText = {ok:'Confere', divergente:'Divergência', pendente:'Pendente', sem_relatorio:'Sem relatório'}[status] || 'Pendente';
  return `<tr data-banco="${b.id}">
    <td><div class="row-name-cell"><b>${b.nome}</b><small>${b.tipo_operacao||''}</small></div></td>
    <td><input class="mono" type="text" inputmode="decimal" data-f="valor_relatorio" value="${rel!=='' ? fmtBRL(rel):''}" placeholder="0,00"></td>
    <td><input class="mono" type="text" inputmode="decimal" data-f="valor_debito" value="${deb!=='' ? fmtBRL(deb):''}" placeholder="0,00"></td>
    <td><span class="val-computed liq">R$ ${fmtBRL(liquido)}</span></td>
    <td><input type="text" data-f="observacoes" value="${(l.observacoes||'').replace(/"/g,'&quot;')}" placeholder="ex: comissão flat"></td>
    <td><input class="mono" type="text" inputmode="decimal" data-f="valor_movimentacoes" value="${mov!=='' ? fmtBRL(mov):''}" placeholder="0,00"></td>
    <td><input type="text" data-f="observacoes_movimentacoes" value="${(l.observacoes_movimentacoes||'').replace(/"/g,'&quot;')}" placeholder="—"></td>
    <td class="statusCell">${badgeHtml(status, badgeText)}</td>
  </tr>`;
}

function badgeHtml(status, text){
  return `<span class="badge ${status}"><i></i>${text}</span>`;
}

function wireRow(b, iso){
  const tr = document.querySelector(`tr[data-banco="${b.id}"]`);
  if (!tr) return;
  const inputs = tr.querySelectorAll('input[data-f]');
  inputs.forEach(inp=>{
    inp.addEventListener('focus', ()=>{ if(['valor_relatorio','valor_debito','valor_movimentacoes'].includes(inp.dataset.f)) inp.value = inp.value.replace(/[^\d,.-]/g,''); });
    inp.addEventListener('blur', async ()=>{
      const field = inp.dataset.f;
      const isMoney = ['valor_relatorio','valor_debito','valor_movimentacoes'].includes(field);
      const val = isMoney ? parseNum(inp.value) : inp.value;
      const fields = {}; fields[field] = val;
      const saved = await upsertLancamento(b.id, iso, fields);
      if (saved){
        if (isMoney) inp.value = fmtBRL(val);
        const liqCell = tr.querySelector('.liq');
        liqCell.textContent = 'R$ ' + fmtBRL(parseNum(saved.valor_relatorio)-parseNum(saved.valor_debito));
        const st = saved.status;
        tr.querySelector('.statusCell').innerHTML = badgeHtml(st, {ok:'Confere', divergente:'Divergência', pendente:'Pendente', sem_relatorio:'Sem relatório'}[st]||'Pendente');
        inp.classList.add('saved');
        setTimeout(()=>inp.classList.remove('saved'), 700);
      }
    });
  });
}

    <div class="page-head">

    <div class="filters-row">

          const liq = parseNum(l.valor_relatorio)-parseNum(l.valor_debito);
          const badgeText = {ok:'Confere', divergente:'Divergência', pendente:'Pendente', sem_relatorio:'Sem relatório'}[l.status]||'Pendente';

            <td class="mono">${l.data.split('-').reverse().join('/')}</td>
            <td>${byId[l.banco_id]?.nome || '—'}</td>
            <td class="mono">R$ ${fmtBRL(l.valor_relatorio)}</td>
            <td class="mono">R$ ${fmtBRL(l.valor_debito)}</td>
            <td class="mono">R$ ${fmtBRL(liq)}</td>
            <td class="mono">R$ ${fmtBRL(l.valor_movimentacoes)}</td>
            <td>${badgeHtml(l.status, badgeText)}</td>
            <td style="color:var(--text-muted);font-size:12px;">${l.observacoes||''}${l.observacoes_movimentacoes ? ' · '+l.observacoes_movimentacoes : ''}</td>
          </tr>`;
        }).join('')}

  main.querySelector('#fGo').onclick = run;

}

function bancoCardHtml(b){
  return `<div class="banco-card" data-id="${b.id}">
    <div>
      <span class="field-label">Nome / tipo</span>
      <div style="display:flex;gap:8px;">
        <input type="text" class="fNome" value="${b.nome}">
        <input type="text" class="fTipo" value="${b.tipo_operacao||''}" placeholder="tipo" style="max-width:150px;">
      </div>
    </div>
    <div>
      <span class="field-label">Periodicidade</span>
      <select class="op-select fPeriod">
        <option value="diaria" ${b.periodicidade==='diaria'?'selected':''}>Diária</option>
        <option value="semanal" ${b.periodicidade==='semanal'?'selected':''}>Semanal</option>
        <option value="mensal" ${b.periodicidade==='mensal'?'selected':''}>Mensal</option>
      </select>
    </div>
    <div class="fDetalhe">${periodDetailHtml(b)}</div>
    <div>
      <span class="field-label">Ativo</span>
      <div class="toggle fAtivo ${b.ativo?'on':''}"></div>
    </div>
    <button class="btn ghost danger fDel" title="Excluir">✕</button>
  </div>`;
}

function periodDetailHtml(b){
  if (b.periodicidade==='semanal'){
    const dias = b.dias_semana||[];
    return `<div><span class="field-label">Dias da semana</span><div class="weekday-picker">
      ${DOW.map((d,i)=>`<button data-d="${i}" class="${dias.includes(i)?'on':''}">${d[0]}</button>`).join('')}
    </div></div>`;
  }
  if (b.periodicidade==='mensal'){
    return `<div><span class="field-label">Dia do mês</span><input type="text" class="fDiaMes mono" value="${b.dia_mes||''}" placeholder="ex: 5" style="width:70px;background:var(--panel-alt);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:8px 10px;"></div>`;
  }
  return `<div style="color:var(--text-muted);font-size:12px;">Aparece todos os dias</div>`;
}

function wireBancoCard(b, main){
  const card = main.querySelector(`.banco-card[data-id="${b.id}"]`);
  if (!card) return;

  const save = async (fields)=>{
    const {data, error} = await sb.from('bancos').update(fields).eq('id', b.id).select().single();
    if (error){ toast('Erro: '+error.message, true); return; }
    Object.assign(b, data);
    toast('Banco atualizado');
  };

  card.querySelector('.fNome').addEventListener('blur', e=>save({nome:e.target.value}));
  card.querySelector('.fTipo').addEventListener('blur', e=>save({tipo_operacao:e.target.value}));
  card.querySelector('.fPeriod').addEventListener('change', async e=>{
    const p = e.target.value;
    const fields = {periodicidade:p};
    if (p==='semanal') fields.dia_mes = null;
    if (p==='mensal') fields.dias_semana = [];
    await save(fields);
    card.querySelector('.fDetalhe').innerHTML = periodDetailHtml(b);
    wireDetalhe(card, b, save);
  });
  wireDetalhe(card, b, save);

  card.querySelector('.fAtivo').addEventListener('click', async e=>{
    const on = !e.currentTarget.classList.contains('on');
    e.currentTarget.classList.toggle('on', on);
    await save({ativo:on});
  });

  card.querySelector('.fDel').addEventListener('click', async ()=>{
    if (!confirm(`Excluir "${b.nome}"? Isso também remove seus lançamentos históricos.`)) return;
    const {error} = await sb.from('bancos').delete().eq('id', b.id);
    if (error){ toast('Erro: '+error.message, true); return; }
    state.bancos = state.bancos.filter(x=>x.id!==b.id);
    renderListaBancos(main);
  });
}

function wireDetalhe(card, b, save){
  const wp = card.querySelectorAll('.weekday-picker button');
  wp.forEach(btn=>{
    btn.onclick = async ()=>{
      const d = Number(btn.dataset.d);
      let dias = new Set(b.dias_semana||[]);
      dias.has(d) ? dias.delete(d) : dias.add(d);
      const arr = Array.from(dias).sort();
      btn.classList.toggle('on');
      await save({dias_semana:arr});
    };
  });
  const dm = card.querySelector('.fDiaMes');
  if (dm) dm.addEventListener('blur', e=>{
    const v = Math.min(31, Math.max(1, parseInt(e.target.value)||1));
    e.target.value = v;
    save({dia_mes:v});
  });
}

render();
</script>
</body>
</html>
