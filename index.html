<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
<title>Connect — ADVEC Maceió · Cantina</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Dancing+Script:wght@700&family=Poppins:wght@400;500;600;700;800&display=swap');

  :root{
    --rustDark:#4A190C;
    --rust:#8C2F14;
    --orange:#D65A1C;
    --orangeLight:#EE8B2E;
    --cream:#F1E1A6;
    --navy:#14141C;
    --navyLight:#1F2130;
    --paper:#FBF7EF;
  }

  html,body{ height:100%; }
  body{
    background: var(--paper);
    font-family: 'Poppins', sans-serif;
    margin:0;
  }
  .headline{ font-family:'Bebas Neue', sans-serif; letter-spacing:0.04em; }
  .flourish{ font-family:'Dancing Script', cursive; }

  .header-gradient{
    background: linear-gradient(160deg, var(--rustDark) 0%, var(--rust) 28%, var(--orange) 62%, var(--orangeLight) 100%);
  }

  .print-report{ display:none; }

  @media print {
    .app-shell{ display:none !important; }
    .print-report{ display:block !important; }
    @page{ margin:14mm; }
  }

  input:focus{ outline:none; border-color: var(--orange) !important; }

  .active\:scale-98:active{ transform:scale(0.98); }

  ::-webkit-scrollbar{ width:0; height:0; }

  .role-badge{
    display:inline-flex; align-items:center; gap:4px;
    font-size:10px; font-weight:600; padding:2px 8px; border-radius:999px;
  }
</style>
</head>
<body>

<div id="loading-screen" class="min-h-screen flex items-center justify-center" style="background:var(--paper)">
  <i data-lucide="loader-2" class="animate-spin" style="color:var(--orange)" width="28" height="28"></i>
</div>

<div id="root" class="hidden"></div>

<script>
/* =========================================================
   Connect Cantina — vanilla JS + Supabase Auth + papéis
   ========================================================= */

const C = {
  rustDark: '#4A190C',
  rust: '#8C2F14',
  orange: '#D65A1C',
  orangeLight: '#EE8B2E',
  cream: '#F1E1A6',
  navy: '#14141C',
  navyLight: '#1F2130',
  paper: '#FBF7EF',
};

const HEADER_GRADIENT = `linear-gradient(160deg, ${C.rustDark} 0%, ${C.rust} 28%, ${C.orange} 62%, ${C.orangeLight} 100%)`;

const PAYMENTS = [
  { id: 'dinheiro', label: 'Dinheiro', icon: 'banknote' },
  { id: 'pix', label: 'Pix', icon: 'qr-code' },
  { id: 'debito', label: 'Débito', icon: 'credit-card' },
  { id: 'credito', label: 'Crédito', icon: 'credit-card' },
];

const ROLES = {
  master: { label: 'Master', color: '#8C2F14', bg: '#FCE8E0' },
  vendedor: { label: 'Vendedor', color: '#2F6F5B', bg: '#E4F2ED' },
};

function paymentLabel(id) {
  const p = PAYMENTS.find(p => p.id === id);
  return p ? p.label : id;
}
function isMaster() {
  return state.currentUser && state.currentUser.role === 'master';
}

/* ---------- helpers ---------- */
function todayStr() {
  return new Date().toLocaleDateString('en-CA');
}
function formatBRL(v) {
  return (Number(v) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function formatDateDisplay(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${d}/${m}/${y}`;
}
function formatDateTime(iso) {
  try {
    const d = new Date(iso);
    return d.toLocaleString('pt-BR');
  } catch (e) { return iso; }
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}
function esc(str) {
  return String(str ?? '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

/* =========================================================
   SUPABASE — configuração (Postgres + Auth + Realtime)
   ========================================================= */
const SUPABASE_URL = "COLE_AQUI_SUA_SUPABASE_URL";
const SUPABASE_ANON_KEY = "COLE_AQUI_SUA_SUPABASE_ANON_KEY";

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// cliente secundário, só para o master poder criar contas de outros usuários
// sem perder a própria sessão logada. persistSession:false faz o signUp
// não escrever nada no localStorage, então a sessão do master não é afetada
// (mesma ideia do "app secundário" que existia no Firebase).
const sbSecondary = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: false, autoRefreshToken: false }
});

/* ---------- mapeamento linha do banco (snake_case) <-> objeto do app (camelCase) ---------- */
function rowToProduct(r) {
  return { id: r.id, name: r.name, costPrice: Number(r.cost_price) || 0, salePrice: Number(r.sale_price) || 0, active: r.active };
}
function rowToSale(r) {
  return {
    id: r.id, date: r.date, time: r.time, productId: r.product_id, productName: r.product_name,
    qty: r.qty, unitPrice: Number(r.unit_price) || 0, unitCost: Number(r.unit_cost) || 0,
    payment: r.payment, userId: r.user_id, userName: r.user_name,
  };
}
function rowToUser(r) {
  return { uid: r.id, name: r.name, email: r.email, role: r.role, active: r.active, createdAt: r.created_at };
}
function rowToAudit(r) {
  return { ts: r.ts, uid: r.uid, name: r.name, role: r.role, action: r.action, details: r.details };
}

/* ---------- log de auditoria ---------- */
async function logAction(action, details) {
  if (!state.currentUser) return;
  await sb.from('audit_log').insert({
    uid: state.currentUser.uid,
    name: state.currentUser.name,
    role: state.currentUser.role,
    action,
    details: details || '',
  });
}

/* ---------- app state ---------- */
const state = {
  authReady: false,
  currentUser: null,      // { uid, email, name, role, active }
  authError: '',
  authMode: 'login',      // 'login' | 'bootstrap'
  bootstrapAvailable: false,

  products: [],
  sales: [],
  users: [],
  auditLog: [],

  tab: 'vendas',
  selectedDate: todayStr(),
  saleTarget: null,
  productModal: null,
  userModal: null,        // null | {} | user (para criar/editar usuário)
  toast: '',
  loadError: false,
};
let toastTimer = null;

function showToast(msg) {
  state.toast = msg;
  clearTimeout(toastTimer);
  render();
  toastTimer = setTimeout(() => { state.toast = ''; render(); }, 1800);
}

/* ---------- products crud ---------- */
async function saveProduct(data) {
  if (data.id) {
    const { error } = await sb.from('products')
      .update({ name: data.name, cost_price: data.costPrice, sale_price: data.salePrice })
      .eq('id', data.id);
    if (error) { showToast('Erro ao salvar: ' + error.message); return; }
    const idx = state.products.findIndex(p => p.id === data.id);
    if (idx >= 0) state.products[idx] = { ...state.products[idx], ...data };
    logAction('editar_produto', `${data.name} (custo ${formatBRL(data.costPrice)}, venda ${formatBRL(data.salePrice)})`);
    showToast('Produto atualizado');
  } else {
    const { data: row, error } = await sb.from('products')
      .insert({ name: data.name, cost_price: data.costPrice, sale_price: data.salePrice, active: true })
      .select().single();
    if (error) { showToast('Erro ao salvar: ' + error.message); return; }
    state.products.push(rowToProduct(row));
    logAction('criar_produto', `${data.name} (custo ${formatBRL(data.costPrice)}, venda ${formatBRL(data.salePrice)})`);
    showToast('Produto adicionado');
  }
  state.productModal = null;
  render();
}
async function removeProduct(id) {
  const p = state.products.find(p => p.id === id);
  const { error } = await sb.from('products').delete().eq('id', id);
  if (error) { showToast('Erro ao remover: ' + error.message); return; }
  state.products = state.products.filter(p => p.id !== id);
  logAction('remover_produto', p ? p.name : id);
  showToast('Produto removido');
  render();
}

/* ---------- sales crud ---------- */
async function addSale(product, qty, payment) {
  const payload = {
    date: todayStr(),
    time: new Date().toISOString(),
    product_id: product.id,
    product_name: product.name,
    qty,
    unit_price: Number(product.salePrice) || 0,
    unit_cost: Number(product.costPrice) || 0,
    payment,
    user_id: state.currentUser.uid,
    user_name: state.currentUser.name,
  };
  const { data: row, error } = await sb.from('sales').insert(payload).select().single();
  if (error) { showToast('Erro ao registrar venda: ' + error.message); return; }
  state.sales.push(rowToSale(row));
  logAction('registrar_venda', `${qty}x ${product.name} · ${formatBRL(product.salePrice * qty)} · ${paymentLabel(payment)}`);
  showToast('Venda registrada');
  state.saleTarget = null;
  render();
}
function canDeleteSale(sale) {
  return isMaster() || sale.userId === state.currentUser.uid;
}
async function removeSale(id) {
  const sale = state.sales.find(s => s.id === id);
  if (!sale || !canDeleteSale(sale)) return;
  const { error } = await sb.from('sales').delete().eq('id', id);
  if (error) { showToast('Erro ao remover: ' + error.message); return; }
  state.sales = state.sales.filter(s => s.id !== id);
  logAction('remover_venda', sale ? `${sale.qty}x ${sale.productName}` : id);
  showToast('Venda removida');
  render();
}

/* ---------- derived ---------- */
function salesForDate(date) {
  return state.sales.filter(s => s.date === date);
}
function totalsFor(list) {
  const revenue = list.reduce((a, s) => a + s.unitPrice * s.qty, 0);
  const cost = list.reduce((a, s) => a + s.unitCost * s.qty, 0);
  const byPayment = PAYMENTS.reduce((acc, p) => ({ ...acc, [p.id]: 0 }), {});
  list.forEach(s => { byPayment[s.payment] = (byPayment[s.payment] || 0) + s.unitPrice * s.qty; });
  return { revenue, cost, profit: revenue - cost, byPayment };
}
function datesWithSales() {
  return [...new Set(state.sales.map(s => s.date))].sort((a, b) => b.localeCompare(a));
}
function shiftDate(delta) {
  const d = new Date(state.selectedDate + 'T12:00:00');
  d.setDate(d.getDate() + delta);
  state.selectedDate = d.toLocaleDateString('en-CA');
  render();
}

/* =========================================================
   AUTENTICAÇÃO
   ========================================================= */

async function ensureProfileOrBootstrap(user) {
  const { data: profileRow } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
  if (profileRow) return rowToUser(profileRow);

  // se ninguém no sistema tem perfil ainda, esta conta vira o primeiro master
  const { count } = await sb.from('profiles').select('*', { count: 'exact', head: true });
  if (!count) {
    const newProfile = {
      id: user.id,
      name: user.email.split('@')[0],
      email: user.email,
      role: 'master',
      active: true,
    };
    const { data: inserted, error } = await sb.from('profiles').insert(newProfile).select().single();
    if (error) return null;
    return rowToUser(inserted);
  }
  return null; // logado no Auth, mas sem perfil autorizado no sistema
}

async function doLogin(email, password) {
  state.authError = '';
  render();
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) {
    state.authError = mapAuthError(error);
    render();
  }
}

async function doBootstrapSignup(email, password, name) {
  state.authError = '';
  render();
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) {
    state.authError = mapAuthError(error);
    render();
    return;
  }
  if (!data.session) {
    // e-mail de confirmação está ativo no Supabase; sem sessão não dá pra criar o perfil ainda
    state.authError = 'Confirme seu e-mail e depois faça login (ou desative "Confirm email" nas configurações de Auth do Supabase).';
    render();
    return;
  }
  await sb.from('profiles').insert({
    id: data.user.id,
    name: name.trim() || email.split('@')[0],
    email,
    role: 'master',
    active: true,
  });
}

function doLogout() {
  logAction('logout', '');
  stopDataSync();
  sb.auth.signOut();
}

function mapAuthError(e) {
  const msg = (e && e.message) || '';
  const map = {
    'Invalid login credentials': 'E-mail ou senha incorretos.',
    'User already registered': 'Já existe uma conta com este e-mail.',
    'Password should be at least 6 characters': 'A senha precisa ter pelo menos 6 caracteres.',
    'Unable to validate email address: invalid format': 'E-mail inválido.',
  };
  return map[msg] || msg || 'Ocorreu um erro. Tente novamente.';
}

/* ---------- gestão de usuários (somente master) ---------- */
async function createUserAccount({ email, password, name, role }) {
  const { data, error } = await sbSecondary.auth.signUp({ email, password });
  if (error) { showToast(mapAuthError(error)); return; }
  const newUid = data.user.id;
  const { error: insertError } = await sb.from('profiles').insert({
    id: newUid,
    name: name.trim(),
    email,
    role,
    active: true,
    created_by: state.currentUser.uid,
  });
  if (insertError) { showToast('Erro ao criar perfil: ' + insertError.message); return; }
  logAction('criar_usuario', `${name} (${role}) · ${email}`);
  showToast('Usuário criado');
  state.userModal = null;
  render();
}

async function updateUserProfile(targetUid, changes) {
  const dbChanges = {};
  if ('name' in changes) dbChanges.name = changes.name;
  if ('role' in changes) dbChanges.role = changes.role;
  if ('active' in changes) dbChanges.active = changes.active;
  const { error } = await sb.from('profiles').update(dbChanges).eq('id', targetUid);
  if (error) { showToast('Erro ao atualizar: ' + error.message); return; }
  const idx = state.users.findIndex(u => u.uid === targetUid);
  if (idx >= 0) state.users[idx] = { ...state.users[idx], ...changes };
  const target = state.users.find(u => u.uid === targetUid);
  logAction('editar_usuario', `${target ? target.name : targetUid} · ${JSON.stringify(changes)}`);
  showToast('Usuário atualizado');
  state.userModal = null;
  render();
}

async function sendPasswordReset(email) {
  const { error } = await sb.auth.resetPasswordForEmail(email);
  if (error) { showToast(mapAuthError(error)); return; }
  showToast('E-mail de redefinição enviado');
}

/* =========================================================
   RENDER — TELA DE LOGIN
   ========================================================= */
function LoginScreen() {
  const mode = state.authMode;
  return `
    <div class="min-h-screen flex flex-col justify-center px-6" style="background:${C.paper}">
      <div class="max-w-sm w-full mx-auto">
        <div class="text-center mb-8">
          <p class="text-xs tracking-[0.3em] uppercase" style="color:${C.rust}">Departamento de Jovens · ADVEC</p>
          <h1 class="headline text-5xl leading-none mt-1" style="color:${C.navy}">
            CONNECT <span style="color:${C.orange}">CANTINA</span>
          </h1>
        </div>

        <div class="rounded-3xl p-5" style="background:#fff; border:1px solid #EEE3CE">
          ${mode === 'login' ? `
            <p class="text-sm font-semibold mb-4" style="color:${C.navy}">Entrar</p>
            <label class="text-xs font-medium text-stone-500">E-mail</label>
            <input id="login-email" type="email" autocomplete="username" placeholder="voce@email.com"
              class="w-full mt-1 mb-3 px-3 py-2.5 rounded-xl border text-sm" style="border-color:#EEE3CE" />
            <label class="text-xs font-medium text-stone-500">Senha</label>
            <input id="login-password" type="password" autocomplete="current-password" placeholder="••••••••"
              class="w-full mt-1 mb-1 px-3 py-2.5 rounded-xl border text-sm" style="border-color:#EEE3CE" />
            <button id="forgot-password-btn" class="text-[11px] mb-4 block" style="color:${C.orange}">Esqueci minha senha</button>
            ${state.authError ? `<p class="text-xs mb-3" style="color:#B23A2E">${esc(state.authError)}</p>` : ''}
            <button id="login-btn" class="w-full py-3 rounded-2xl text-white font-semibold" style="background:${HEADER_GRADIENT}">
              Entrar
            </button>
            <button id="show-bootstrap-btn" class="w-full text-center text-[11px] mt-4" style="color:#999">
              Primeiro acesso do sistema? Criar administrador
            </button>
          ` : `
            <p class="text-sm font-semibold mb-1" style="color:${C.navy}">Criar administrador (master)</p>
            <p class="text-[11px] text-stone-500 mb-4">Isso só funciona se o sistema ainda não tiver nenhum usuário cadastrado. Depois disso, novos usuários são criados pelo master dentro do app.</p>
            <label class="text-xs font-medium text-stone-500">Nome</label>
            <input id="bs-name" placeholder="Seu nome"
              class="w-full mt-1 mb-3 px-3 py-2.5 rounded-xl border text-sm" style="border-color:#EEE3CE" />
            <label class="text-xs font-medium text-stone-500">E-mail</label>
            <input id="bs-email" type="email" placeholder="voce@email.com"
              class="w-full mt-1 mb-3 px-3 py-2.5 rounded-xl border text-sm" style="border-color:#EEE3CE" />
            <label class="text-xs font-medium text-stone-500">Senha (mín. 6 caracteres)</label>
            <input id="bs-password" type="password" placeholder="••••••••"
              class="w-full mt-1 mb-1 px-3 py-2.5 rounded-xl border text-sm" style="border-color:#EEE3CE" />
            ${state.authError ? `<p class="text-xs mb-3 mt-2" style="color:#B23A2E">${esc(state.authError)}</p>` : ''}
            <button id="bootstrap-btn" class="w-full py-3 rounded-2xl text-white font-semibold mt-3" style="background:${HEADER_GRADIENT}">
              Criar administrador e entrar
            </button>
            <button id="show-login-btn" class="w-full text-center text-[11px] mt-4" style="color:#999">
              Voltar para login
            </button>
          `}
        </div>
        ${state.authNoProfile ? `
          <p class="text-xs text-center mt-4" style="color:#B23A2E">
            Sua conta existe mas não tem acesso liberado neste app. Peça a um administrador para te cadastrar em "Usuários".
          </p>
        ` : ''}
      </div>
    </div>
  `;
}

function attachLoginHandlers() {
  const loginBtn = document.getElementById('login-btn');
  if (loginBtn) loginBtn.addEventListener('click', () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) return;
    doLogin(email, password);
  });
  const forgot = document.getElementById('forgot-password-btn');
  if (forgot) forgot.addEventListener('click', () => {
    const email = document.getElementById('login-email').value.trim();
    if (!email) { showToast('Digite seu e-mail primeiro'); return; }
    sendPasswordReset(email);
  });
  const showBootstrap = document.getElementById('show-bootstrap-btn');
  if (showBootstrap) showBootstrap.addEventListener('click', () => { state.authMode = 'bootstrap'; state.authError = ''; render(); });
  const showLogin = document.getElementById('show-login-btn');
  if (showLogin) showLogin.addEventListener('click', () => { state.authMode = 'login'; state.authError = ''; render(); });
  const bootstrapBtn = document.getElementById('bootstrap-btn');
  if (bootstrapBtn) bootstrapBtn.addEventListener('click', () => {
    const name = document.getElementById('bs-name').value;
    const email = document.getElementById('bs-email').value.trim();
    const password = document.getElementById('bs-password').value;
    if (!email || !password) return;
    doBootstrapSignup(email, password, name);
  });
}

/* =========================================================
   RENDER — APP PRINCIPAL
   ========================================================= */

function renderIcons() {
  if (window.lucide) window.lucide.createIcons();
}

function Header() {
  const role = ROLES[state.currentUser.role] || ROLES.vendedor;
  return `
    <header class="relative overflow-hidden px-5 pt-6 pb-5 header-gradient">
      <div class="absolute -right-6 -top-8 w-40 h-40 rounded-full opacity-20" style="background:${C.navy}; filter:blur(30px)"></div>
      <div class="absolute right-2 bottom-0 opacity-15 select-none pointer-events-none flourish text-5xl" style="color:${C.cream}">Até sermos Um</div>
      <div class="flex items-start justify-between relative">
        <div>
          <p class="text-xs tracking-[0.3em] uppercase" style="color:${C.cream}">Departamento de Jovens · ADVEC</p>
          <h1 class="headline text-4xl leading-none mt-1" style="color:#fff">
            CONNECT <span style="color:${C.cream}">— ADVEC MACEIÓ</span>
          </h1>
          <p class="text-sm mt-1" style="color:rgba(255,255,255,0.85)">Cantina · Controle de Vendas</p>
        </div>
        <button id="logout-btn" class="p-2 rounded-full" style="background:rgba(0,0,0,0.18)">
          <i data-lucide="log-out" width="16" height="16" style="color:#fff"></i>
        </button>
      </div>
      <div class="mt-3 relative flex items-center gap-2">
        <span class="role-badge" style="background:${role.bg}; color:${role.color}">
          <i data-lucide="${state.currentUser.role === 'master' ? 'shield-check' : 'user'}" width="11" height="11"></i>
          ${role.label}
        </span>
        <span class="text-xs" style="color:rgba(255,255,255,0.8)">${esc(state.currentUser.name)}</span>
      </div>
    </header>
  `;
}

function BottomNav() {
  const items = [
    { id: 'vendas', label: 'Vendas', icon: 'shopping-cart', show: true },
    { id: 'produtos', label: 'Produtos', icon: 'package', show: isMaster() },
    { id: 'relatorio', label: 'Relatório', icon: 'file-text', show: isMaster() },
    { id: 'historico', label: 'Histórico', icon: 'history', show: isMaster() },
    { id: 'usuarios', label: 'Usuários', icon: 'users', show: isMaster() },
  ].filter(i => i.show);
  return `
    <nav class="fixed bottom-0 left-0 right-0 z-40" style="background:${C.navy}">
      <div class="flex justify-around items-center py-2">
        ${items.map(({ id, label, icon }) => {
          const active = state.tab === id;
          const color = active ? C.orangeLight : '#8A8A99';
          return `
            <button data-tab="${id}" class="nav-btn flex flex-col items-center gap-0.5 px-2 py-1">
              <i data-lucide="${icon}" width="20" height="20" style="color:${color}"></i>
              <span class="text-[10px]" style="color:${color}">${label}</span>
            </button>
          `;
        }).join('')}
      </div>

        ${!editing ? `
          <label class="text-xs font-medium text-stone-500">Senha inicial (mín. 6 caracteres)</label>
          <input id="um-password" type="text" placeholder="Defina uma senha"
            class="w-full mt-1 mb-3 px-3 py-2.5 rounded-xl border text-sm" style="border-color:#EEE3CE" />
        ` : ''}

        <label class="text-xs font-medium text-stone-500">Papel</label>
        <select id="um-role" class="w-full mt-1 mb-5 px-3 py-2.5 rounded-xl border text-sm" style="border-color:#EEE3CE">
          <option value="vendedor" ${user.role !== 'master' ? 'selected' : ''}>Vendedor (sem acesso a custos/relatórios)</option>
          <option value="master" ${user.role === 'master' ? 'selected' : ''}>Master (acesso total)</option>
        </select>

        <button id="save-user-btn" class="w-full py-3 rounded-2xl text-white font-semibold" style="background:${HEADER_GRADIENT}">
          ${editing ? 'Salvar alterações' : 'Criar usuário'}
        </button>
      </div>
    </div>
  `;
}

/* ---------- main render ---------- */
function render() {
  const root = document.getElementById('root');

  if (!state.currentUser) {
    root.innerHTML = LoginScreen();
    renderIcons();
    attachLoginHandlers();
    return;
  }

  const tabContent = state.tab === 'vendas' ? VendasTab()
    : state.tab === 'produtos' && isMaster() ? ProdutosTab()
    : state.tab === 'relatorio' && isMaster() ? RelatorioTab()
    : state.tab === 'historico' && isMaster() ? HistoricoTab()
    : state.tab === 'usuarios' && isMaster() ? UsuariosTab()
    : VendasTab();

  root.innerHTML = `
    <div class="min-h-screen flex flex-col" style="background:${C.paper}; font-family:'Poppins', sans-serif">
      <div class="app-shell flex flex-col min-h-screen">
        ${Header()}

        ${state.loadError ? `
          <div class="mx-4 mt-3 text-xs rounded-lg px-3 py-2" style="background:#FCE8E0; color:#8C2F14">
            Não foi possível carregar os dados salvos. Os dados desta sessão podem não estar completos.
          </div>
        ` : ''}

        <main class="flex-1 overflow-y-auto px-4 pt-4 pb-28">
          ${tabContent}
        </main>

        ${BottomNav()}
      </div>

      ${PrintableReport()}
      ${SaleModal()}
      ${ProductModal()}
      ${UserModal()}

      ${state.toast ? `
        <div class="fixed left-1/2 bottom-24 -translate-x-1/2 z-50 text-white text-sm px-4 py-2 rounded-full shadow-lg flex items-center gap-2" style="background:${C.navy}">
          <i data-lucide="check-circle-2" width="16" height="16" style="color:${C.orangeLight}"></i> ${esc(state.toast)}
        </div>
      ` : ''}
    </div>
  `;

  renderIcons();
  attachHandlers();
}

/* ---------- event handlers ---------- */
function attachHandlers() {
  const logoutBtn = document.getElementById('logout-btn');
  if (logoutBtn) logoutBtn.addEventListener('click', doLogout);

  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => { state.tab = btn.dataset.tab; render(); });
  });

  const goProducts = document.getElementById('go-products-btn');
  if (goProducts) goProducts.addEventListener('click', () => { state.tab = 'produtos'; render(); });

  document.querySelectorAll('[data-pick-product]').forEach(btn => {
    btn.addEventListener('click', () => {
      const product = state.products.find(p => p.id === btn.dataset.pickProduct);
      state.saleTarget = product;
      saleModalQty = 1;
      saleModalPayment = null;
      render();
    });
  });

  document.querySelectorAll('[data-delete-sale]').forEach(btn => {
    btn.addEventListener('click', () => removeSale(btn.dataset.deleteSale));
  });

  const addProductBtn = document.getElementById('add-product-btn');
  if (addProductBtn) addProductBtn.addEventListener('click', () => { state.productModal = {}; render(); });

  document.querySelectorAll('[data-edit-product]').forEach(btn => {
    btn.addEventListener('click', () => {
      const product = state.products.find(p => p.id === btn.dataset.editProduct);
      state.productModal = product;
      render();
    });
  });
  document.querySelectorAll('[data-remove-product]').forEach(btn => {
    btn.addEventListener('click', () => removeProduct(btn.dataset.removeProduct));
  });

  const shiftPrev = document.getElementById('shift-prev');
  const shiftNext = document.getElementById('shift-next');
  const goToday = document.getElementById('go-today');
  if (shiftPrev) shiftPrev.addEventListener('click', () => shiftDate(-1));
  if (shiftNext) shiftNext.addEventListener('click', () => shiftDate(1));
  if (goToday) goToday.addEventListener('click', () => { state.selectedDate = todayStr(); render(); });

  const printBtn = document.getElementById('print-btn');
  if (printBtn) printBtn.addEventListener('click', () => window.print());

  document.querySelectorAll('[data-open-date]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.selectedDate = btn.dataset.openDate;
      state.tab = 'relatorio';
      render();
    });
  });

  // usuários
  const addUserBtn = document.getElementById('add-user-btn');
  if (addUserBtn) addUserBtn.addEventListener('click', () => { state.userModal = {}; render(); });

  document.querySelectorAll('[data-toggle-role]').forEach(btn => {
    btn.addEventListener('click', () => {
      const u = state.users.find(u => u.uid === btn.dataset.toggleRole);
      if (!u) return;
      updateUserProfile(u.uid, { role: u.role === 'master' ? 'vendedor' : 'master' });
    });
  });
  document.querySelectorAll('[data-toggle-active]').forEach(btn => {
    btn.addEventListener('click', () => {
      const u = state.users.find(u => u.uid === btn.dataset.toggleActive);
      if (!u) return;
      updateUserProfile(u.uid, { active: u.active === false ? true : false });
    });
  });

  // sale modal
  const saleOverlay = document.getElementById('sale-modal-overlay');
  if (saleOverlay) {
    saleOverlay.addEventListener('click', () => { state.saleTarget = null; render(); });
    document.getElementById('close-sale-modal').addEventListener('click', () => { state.saleTarget = null; render(); });

    document.getElementById('qty-minus').addEventListener('click', () => {
      saleModalQty = Math.max(1, saleModalQty - 1);
      updateSaleModalPartial();
    });
    document.getElementById('qty-plus').addEventListener('click', () => {
      saleModalQty = saleModalQty + 1;
      updateSaleModalPartial();
    });

    document.querySelectorAll('.payment-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        saleModalPayment = btn.dataset.payment;
        render();
      });
    });

    const confirmBtn = document.getElementById('confirm-sale');
    if (confirmBtn) {
      confirmBtn.addEventListener('click', () => {
        if (!saleModalPayment) return;
        addSale(state.saleTarget, saleModalQty, saleModalPayment);
      });
    }
  }

  // product modal
  const productOverlay = document.getElementById('product-modal-overlay');
  if (productOverlay) {
    productOverlay.addEventListener('click', () => { state.productModal = null; render(); });
    document.getElementById('close-product-modal').addEventListener('click', () => { state.productModal = null; render(); });

    const saveBtn = document.getElementById('save-product-btn');
    saveBtn.addEventListener('click', () => {
      const name = document.getElementById('pm-name').value;
      const costPrice = document.getElementById('pm-cost').value;
      const salePrice = document.getElementById('pm-sale').value;
      if (!name.trim() || salePrice === '') return;
      saveProduct({
        id: state.productModal.id,
        name: name.trim(),
        costPrice: Number(costPrice) || 0,
        salePrice: Number(salePrice),
      });
    });
  }

  // user modal
  const userOverlay = document.getElementById('user-modal-overlay');
  if (userOverlay) {
    userOverlay.addEventListener('click', () => { state.userModal = null; render(); });
    document.getElementById('close-user-modal').addEventListener('click', () => { state.userModal = null; render(); });

    const saveUserBtn = document.getElementById('save-user-btn');
    saveUserBtn.addEventListener('click', () => {
      const name = document.getElementById('um-name').value.trim();
      const role = document.getElementById('um-role').value;
      if (!name) return;
      if (state.userModal.uid) {
        updateUserProfile(state.userModal.uid, { name, role });
      } else {
        const email = document.getElementById('um-email').value.trim();
        const password = document.getElementById('um-password').value;
        if (!email || password.length < 6) { showToast('Preencha e-mail e uma senha com 6+ caracteres'); return; }
        createUserAccount({ email, password, name, role });
      }
    });
  }
}

function updateSaleModalPartial() {
  const qtyDisplay = document.getElementById('qty-display');
  const saleTotal = document.getElementById('sale-total');
  if (qtyDisplay) qtyDisplay.textContent = saleModalQty;
  if (saleTotal) saleTotal.textContent = formatBRL(state.saleTarget.salePrice * saleModalQty);
}

/* ---------- live sync (Supabase Realtime) ---------- */
let syncAttached = false;
let channels = [];

function startDataSync() {
  if (syncAttached) return;
  syncAttached = true;

  const productsCh = sb.channel('products-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'products' }, payload => {
      if (state.saleTarget || state.productModal) return;
      applyChange(state.products, payload, rowToProduct, 'id');
      render();
    })
    .subscribe();
  channels.push(productsCh);

  const salesCh = sb.channel('sales-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'sales' }, payload => {
      applyChange(state.sales, payload, rowToSale, 'id');
      render();
    })
    .subscribe();
  channels.push(salesCh);

  if (isMaster()) {
    const usersCh = sb.channel('profiles-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, payload => {
        if (state.userModal) return;
        applyChange(state.users, payload, rowToUser, 'uid', 'id');
        render();
      })
      .subscribe();
    channels.push(usersCh);

    const auditCh = sb.channel('audit-changes')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'audit_log' }, payload => {
        state.auditLog.push(rowToAudit(payload.new));
        render();
      })
      .subscribe();
    channels.push(auditCh);
  }
}

// aplica um evento realtime (INSERT/UPDATE/DELETE) numa lista local, sem duplicar
function applyChange(list, payload, mapFn, localKey, dbKey = 'id') {
  if (payload.eventType === 'DELETE') {
    const removedId = payload.old[dbKey];
    const idx = list.findIndex(item => item[localKey] === removedId);
    if (idx >= 0) list.splice(idx, 1);
    return;
  }
  const mapped = mapFn(payload.new);
  const idx = list.findIndex(item => item[localKey] === mapped[localKey]);
  if (idx >= 0) list[idx] = mapped;
  else list.push(mapped);
}

function stopDataSync() {
  syncAttached = false;
  channels.forEach(ch => sb.removeChannel(ch));
  channels = [];
}

/* ---------- init / auth listener ---------- */
async function handleSession(session) {
  document.getElementById('loading-screen').classList.remove('hidden');
  document.getElementById('root').classList.add('hidden');

  const user = session ? session.user : null;

  if (!user) {
    state.currentUser = null;
    state.authReady = true;
    document.getElementById('loading-screen').classList.add('hidden');
    document.getElementById('root').classList.remove('hidden');
    render();
    return;
  }

  try {
    const profile = await ensureProfileOrBootstrap(user);
    if (!profile || profile.active === false) {
      state.authNoProfile = true;
      state.currentUser = null;
      await sb.auth.signOut();
      document.getElementById('loading-screen').classList.add('hidden');
      document.getElementById('root').classList.remove('hidden');
      render();
      return;
    }
    state.authNoProfile = false;
    state.currentUser = { uid: user.id, email: user.email, name: profile.name, role: profile.role, active: profile.active };

    const [{ data: productRows }, { data: saleRows }] = await Promise.all([
      sb.from('products').select('*'),
      sb.from('sales').select('*'),
    ]);
    state.products = (productRows || []).map(rowToProduct);
    state.sales = (saleRows || []).map(rowToSale);

    if (isMaster()) {
      const [{ data: userRows }, { data: auditRows }] = await Promise.all([
        sb.from('profiles').select('*'),
        sb.from('audit_log').select('*').order('ts', { ascending: true }).limit(200),
      ]);
      state.users = (userRows || []).map(rowToUser);
      state.auditLog = (auditRows || []).map(rowToAudit);
    }

    logAction('login', '');
    startDataSync();
  } catch (e) {
    state.loadError = true;
  }

  document.getElementById('loading-screen').classList.add('hidden');
  document.getElementById('root').classList.remove('hidden');
  render();
}

let sessionHandled = false;
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'TOKEN_REFRESHED') return;
  if (event === 'SIGNED_OUT') { sessionHandled = false; handleSession(null); return; }
  if (sessionHandled && event === 'INITIAL_SESSION') return;
  sessionHandled = true;
  handleSession(session);
});
</script>
